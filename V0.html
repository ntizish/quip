<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL PATTERN GEN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap');

  :root {
    --bg: #111111;
    --panel: #161616;
    --border: #2a2a2a;
    --accent: #ffffff;
    --accent2: #aaaaaa;
    --accent3: #cccccc;
    --text: #dddddd;
    --dim: #555555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 22%; min-width: 200px; max-width: 300px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; overflow-x: hidden;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-track { background: var(--panel); }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .logo {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 4px; font-size: 11px;
    color: var(--accent); text-transform: uppercase;
  }
  .logo span { color: var(--dim); }

  .section { padding: 11px 16px; border-bottom: 1px solid var(--border); }
  .section-label {
    font-size: 9px; letter-spacing: 3px;
    color: var(--dim); text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Mode buttons */
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .mode-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; padding: 6px 3px;
    cursor: pointer; letter-spacing: 0.5px;
    text-transform: uppercase; transition: all 0.15s;
    text-align: center;
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mode-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Sliders */
  .param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .param-label {
    font-size: 9px; color: var(--dim);
    width: 74px; flex-shrink: 0;
    text-transform: uppercase; line-height: 1.2;
  }
  .param-value {
    font-size: 9px; color: var(--accent);
    width: 28px; text-align: right; flex-shrink: 0;
  }
  input[type=range] {
    flex: 1; -webkit-appearance: none;
    height: 2px; background: var(--border);
    outline: none; border-radius: 1px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px; height: 11px;
    background: var(--accent); border-radius: 50%;
    cursor: pointer; transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.4); }

  /* Shape picker */
  .shape-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; margin-bottom: 8px; }
  .shape-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); font-size: 16px; padding: 6px 0;
    cursor: pointer; text-align: center;
    transition: all 0.15s; border-radius: 2px;
  }
  .shape-btn:hover { border-color: var(--accent); }
  .shape-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Color scheme swatches */
  .color-scheme-grid { display:flex; flex-direction:row; gap:8px; margin-bottom:10px; }
  .color-swatch {
    height: 36px; border-radius: 3px; cursor: pointer;
    border: 2px solid transparent;
    position: relative; overflow: hidden;
    transition: border-color 0.15s, transform 0.1s;
    display: flex; align-items: flex-end; padding: 3px 5px;
  }
  .color-swatch:hover { transform: scale(1.04); }
  .color-swatch.active { border-color: var(--accent) !important; }
  .color-swatch span {
    font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    pointer-events: none; line-height: 1;
  }
  .color-swatch.dark-text span { color: rgba(0,0,0,0.7); text-shadow: none; }

  /* Color variation */
  .color-var-row { display: flex; gap: 5px; }
  .cvar-btn {
    flex: 1; background: transparent;
    border: 1px solid var(--border); color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; padding: 5px 2px;
    cursor: pointer; text-align: center;
    letter-spacing: 0.5px; text-transform: uppercase;
    transition: all 0.15s;
  }
  .cvar-btn:hover { border-color: var(--text); color: var(--text); }
  .cvar-btn.active { border-color: var(--accent); color: var(--accent); }

  /* Toggles */
  .toggle-row {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 7px;
  }
  .toggle-label { font-size: 9px; letter-spacing: 1px; color: var(--text); text-transform: uppercase; }
  .toggle { position: relative; width: 36px; height: 18px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border); border-radius: 9px;
    cursor: pointer; transition: background 0.2s;
  }
  .toggle-track::after {
    content: ''; position: absolute;
    left: 3px; top: 3px;
    width: 12px; height: 12px;
    background: var(--dim); border-radius: 50%;
    transition: all 0.2s;
  }
  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle input:checked + .toggle-track::after { left: 21px; background: #000; }

  /* Buttons */
  .btn-row { display: flex; gap: 5px; margin-top: 4px; }
  .btn {
    flex: 1; background: transparent;
    border: 1px solid var(--border); color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; padding: 7px 2px;
    cursor: pointer; letter-spacing: 1px;
    text-transform: uppercase; transition: all 0.15s; text-align: center;
  }
  .btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn.primary { border-color: var(--accent3); color: var(--accent3); }
  .btn.primary:hover { background: var(--accent3); color: #fff; }
  .btn.reset:hover { border-color: #ffcc00; color: #ffcc00; }

  /* Size buttons */
  .size-btn-row { display: flex; gap: 4px; flex: 1; }
  .size-btn {
    flex: 1; background: transparent;
    border: 1px solid var(--border); color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px; padding: 5px 2px;
    cursor: pointer; text-align: center;
    letter-spacing: 0.5px; text-transform: uppercase;
    transition: all 0.15s;
  }
  .size-btn:hover { border-color: var(--text); color: var(--text); }
  .size-btn.active { border-color: var(--accent); color: var(--accent); background: transparent; }

  /* New color grid: two columns, wide horizontal swatches */
  .color-grid-2col { display: flex; gap: 6px; }
  .color-col { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .color-col-label { font-size: 8px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; margin-bottom: 3px; }
  .color-swatch-wide {
    height: 28px; border-radius: 3px; cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.1s;
  }
  .color-swatch-wide:hover { transform: scale(1.02); }
  .color-swatch-wide.active { border-color: var(--accent) !important; }

  /* Collapsible */
  .collapsible-header {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
    font-size: 9px; letter-spacing: 2px; color: var(--dim);
    text-transform: uppercase; user-select: none;
  }
  .collapsible-header:hover { color: var(--text); }
  .collapsible-arrow { font-size: 10px; transition: transform 0.2s; }
  .collapsible-arrow.open { transform: rotate(180deg); }
  .collapsible-body { display: none; }
  .collapsible-body.open { display: block; }


  #main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    background: var(--bg);
    padding: 16px;
    min-width: 0;
  }
  #canvas-wrap {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    width: min(calc(100vh - 80px), 100%);
    aspect-ratio: 1;
    flex-shrink: 1;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  #bottom-bar {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; flex-shrink: 0; gap: 12px;
  }
  #anim-controls { display: flex; align-items: center; gap: 6px; }
  #btnPlayPause {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); font-size: 14px;
    width: 32px; height: 32px; border-radius: 4px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  #btnPlayPause:hover { border-color: var(--accent); color: var(--accent); }
  #btnUndo:disabled { opacity: 0.25; cursor: default; }
  .speed-btn {
    background: transparent; border: 1px solid var(--border); color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px; padding: 0 8px; height: 32px; border-radius: 4px;
    cursor: pointer; letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .speed-btn:hover { border-color: var(--text); color: var(--text); }
  .speed-btn.active { border-color: var(--accent); color: var(--accent); }
  #export-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .export-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; padding: 0 14px; height: 32px;
    cursor: pointer; letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .export-btn:hover { border-color: var(--text); color: var(--text); }
  .export-btn.reset:hover { border-color: #ffcc00; color: #ffcc00; }

  #preset-panel {
    width: 9%; min-width: 70px; max-width: 80px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center;
    padding: 16px 8px 12px;
    gap: 10px;
    overflow-y: auto;
  }
  #preset-actions {
    margin-top: auto;
    display: flex; flex-direction: column; gap: 5px; width: 100%;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .preset-action-btn {
    width: 100%; background: transparent;
    border: 1px solid var(--border); color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; padding: 7px 2px;
    cursor: pointer; letter-spacing: 1px;
    text-transform: uppercase; transition: all 0.15s; text-align: center;
  }
  .preset-action-btn:hover { border-color: var(--text); color: var(--text); }
  .preset-action-btn.reset:hover { border-color: #ffcc00; color: #ffcc00; }
  .preset-action-btn:disabled { opacity: 0.25; cursor: default; }
  .preset-label {
    font-size: 8px; letter-spacing: 2px; color: var(--dim);
    text-transform: uppercase; margin-bottom: 2px;
  }
  #preset-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; padding: 6px; }
  .preset-slot {
    width: 100%; aspect-ratio: 1;
    border: 1px solid var(--border); border-radius: 6px;
    cursor: pointer; position: relative;
    transition: border-color 0.15s; flex-shrink: 0;
  }
  .preset-slot img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; image-rendering: pixelated;
    border-radius: 5px;
  }
  .preset-slot:hover { border-color: var(--accent2); }
  .preset-slot.filled:hover { border-color: var(--accent); }
  .preset-slot .plus {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: var(--border);
    transition: color 0.15s; user-select: none;
  }
  .preset-slot:hover .plus { color: var(--dim); }
  .preset-slot .preset-del {
    position: absolute; top: -5px; right: -5px;
    width: 14px; height: 14px;
    background: #222; border: 1px solid var(--border);
    border-radius: 50%;
    font-size: 7px; color: var(--dim);
    cursor: pointer; z-index: 10; line-height: 14px;
    text-align: center;
    transition: all 0.1s;
  }
  .preset-slot .preset-del:hover { background: #ff4444; color: #fff; border-color: #ff4444; }

  /* ── SIDEBAR TABS ── */
  #sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-tab {
    flex: 1; background: transparent;
    border: none; border-bottom: 2px solid transparent;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; padding: 10px 4px;
    cursor: pointer; letter-spacing: 2px;
    text-transform: uppercase; transition: all 0.15s;
    text-align: center; margin-bottom: -1px;
  }
  .sidebar-tab:hover { color: var(--text); }
  .sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  #sidebar-panel-gen,
  #sidebar-panel-img  { display: none; flex-direction: column; flex: 1; overflow-y: auto; overflow-x: hidden; }
  #sidebar-panel-img  { padding: 16px; }
  #sidebar-panel-gen.active,
  #sidebar-panel-img.active  { display: flex; }

  .empty-panel {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; opacity: 0.3;
  }
  .empty-panel-icon { font-size: 28px; }
  .empty-panel-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }

  /* Upload buttons */
  .upload-btn {
    width: 100%; background: transparent;
    border: 1px solid var(--border); color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; padding: 12px 10px;
    cursor: pointer; letter-spacing: 1.5px;
    text-transform: uppercase; transition: all 0.15s;
    display: flex; align-items: center; gap: 8px;
    border-radius: 3px;
  }
  .upload-btn:hover { border-color: var(--accent); color: var(--accent); }
  .upload-btn-icon { font-size: 14px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="sidebar">
  <div class="logo">quip gen <span>// v3</span></div>

  <div id="sidebar-tabs">
    <button class="sidebar-tab active" data-panel="gen">Pattern</button>
    <button class="sidebar-tab" data-panel="img">Image</button>
  </div>

  <div id="sidebar-panel-gen" class="active">

  <div class="section">
    <div class="section-label">Pattern Mode</div>
    <div class="mode-grid" id="modeGrid"></div>
    <div class="toggle-row" style="margin-top:8px">
      <span class="toggle-label">Radial Sym</span>
      <label class="toggle"><input type="checkbox" id="radialSym"><span class="toggle-track"></span></label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Circle Mask</span>
      <label class="toggle"><input type="checkbox" id="circleMask" checked><span class="toggle-track"></span></label>
    </div>
    <div class="param-row">
      <span class="param-label">Rays</span>
      <input type="range" id="radialRays" min="3" max="24" step="1" value="6">
      <span class="param-value" id="radialRaysVal">6</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Parameters</div>
    <div id="params"></div>
  </div>

  <div class="section">
    <div class="section-label">Pixel Style</div>
    <div class="shape-grid" id="shapeGrid"></div>
    <div class="toggle-row">
      <span class="toggle-label">Mix Shapes</span>
      <label class="toggle"><input type="checkbox" id="mixShapes"><span class="toggle-track"></span></label>
    </div>
    <div class="param-row" style="margin-bottom:7px">
      <span class="param-label">Size</span>
      <div class="size-btn-row" id="sizeBtnRow"></div>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Spacing</span>
      <label class="toggle"><input type="checkbox" id="spacingToggle"><span class="toggle-track"></span></label>
    </div>
    <div class="param-row">
      <span class="param-label">Zoom</span>
      <input type="range" id="shapeScale" min="0.3" max="2.0" step="0.05" value="1.0">
      <span class="param-value" id="shapeScaleVal">1.0</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Color Scheme</div>
    <div id="colorGrid"></div>
    <div class="toggle-row" id="mixToggleRow" style="margin-top:6px;padding-right:50%">
      <span class="toggle-label">Mix</span>
      <label class="toggle"><input type="checkbox" id="lightMixToggle"><span class="toggle-track"></span></label>
    </div>
    <div id="colorVarRow" style="display:none"></div>
    <!-- Additional: Vivid + Pantone collapsible -->
    <div class="collapsible-header" id="additionalHeader" style="padding:8px 0;margin-top:4px;border-top:1px solid var(--border);">
      <span>Additional</span><span class="collapsible-arrow">▾</span>
    </div>
    <div class="collapsible-body" id="additionalBody">
      <div id="colorGridExtra" style="margin-top:6px;"></div>
    </div>
  </div>
  </div><!-- /sidebar-panel-gen -->

  <div id="sidebar-panel-img">
    <div class="section" style="border-top:none">
      <div class="section-label">Presets</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:4px;" id="gradPresetGrid"></div>
      <div style="font-size:8px; letter-spacing:1px; color:var(--dim); margin-top:2px;">Click to set as Photo 1 or 2</div>
    </div>

    <div class="section">
      <div class="section-label">Upload</div>
      <div style="display:flex; flex-direction:column; gap:8px; margin-top:4px;">
        <button class="upload-btn" id="btnUploadPhoto" onclick="document.getElementById('inputPhoto').click()">
          <span class="upload-btn-icon">🖼</span>
          <span>Load Photo 1</span>
        </button>
        <input type="file" id="inputPhoto" accept="image/*,video/*" style="display:none">
        <button class="upload-btn" id="btnUploadPhoto2" onclick="document.getElementById('inputPhoto2').click()">
          <span class="upload-btn-icon">🖼</span>
          <span>Load Photo 2</span>
        </button>
        <input type="file" id="inputPhoto2" accept="image/*,video/*" style="display:none">
      </div>
    </div>

    <div class="section">
      <div class="section-label">Pixel Size</div>
      <div class="size-btn-row" style="margin-top:4px;">
        <button class="size-btn active" id="flipSizeS" data-flipsize="20">S</button>
        <button class="size-btn" id="flipSizeM" data-flipsize="50">M</button>
        <button class="size-btn" id="flipSizeL" data-flipsize="80">L</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Wave Type</div>
      <div class="mode-grid" style="margin-bottom:4px;">
        <button class="mode-btn active" data-wave="1">Radial</button>
        <button class="mode-btn" data-wave="2">Pulse</button>
        <button class="mode-btn" data-wave="3">Diagonal</button>
        <button class="mode-btn" data-wave="4">Linear</button>
        <button class="mode-btn" data-wave="5">Spiral</button>
        <button class="mode-btn" data-wave="6">Rings</button>
      </div>
    </div>

  </div><!-- /sidebar-panel-img -->

</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>
  <div id="media-wrap" style="display:none; border:1px solid var(--border); border-radius:12px; overflow:hidden; width:min(calc(100vh - 80px),100%); aspect-ratio:1; flex-shrink:1; position:relative; background:#111;">
    <div id="media-placeholder" style="position:absolute;inset:0;display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; opacity:0.25; pointer-events:none;">
      <div style="font-size:36px;">🖼</div>
      <div style="font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--dim);">Load photo or video</div>
    </div>
    <canvas id="flipCanvas" style="width:100%;height:100%;display:block;position:absolute;inset:0;"></canvas>
    <canvas id="overlayCanvas" style="width:100%;height:100%;display:block;position:absolute;inset:0;pointer-events:none;"></canvas>
  </div>
  <div id="bottom-bar">
    <div id="anim-controls">
      <button id="btnPlayPause">⏸</button>
      <button class="speed-btn" data-speed="0.015">0.75×</button>
      <button class="speed-btn active" data-speed="0.02">1×</button>
      <button class="speed-btn" data-speed="0.025">1.25×</button>
    </div>
    <div id="flip-controls" style="display:none;">
      <button id="btnFlipTrigger" class="export-btn" style="letter-spacing:2px; padding:0 28px; height:32px; border-color:var(--accent3); color:var(--accent3);">▶ Flip</button>
    </div>
    <div id="export-btns">
      <button class="export-btn" id="btnUndo" title="Undo (⌘Z)">↩ Undo</button>
      <button class="export-btn" id="btnSeed">New Seed</button>
      <button class="export-btn reset" id="btnReset">Reset</button>
    </div>
  </div>
</div>

<div id="preset-panel">
  <div class="preset-label">Presets</div>
  <div id="preset-grid"></div>
  <div id="preset-actions">
    <button class="preset-action-btn" id="btnSave">PNG</button>
    <button class="preset-action-btn" id="btnSaveSvg">SVG</button>
    <button class="preset-action-btn" id="btnRecMp4">● Video</button>
  </div>
</div>

<script>
// ================================================================
//  CONSTANTS
// ================================================================
const CANVAS_SIZE = 640;

const MODES = [
  { name: "Noise Lines", key: "noiseLines" },

const undoStack = [];
const MAX_UNDO = 40;
function pushUndo() {
  undoStack.push(JSON.stringify(state));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  const btn = document.getElementById('btnUndo');
  if (btn) btn.disabled = false;
}
function syncUI() {
  for (let k=1;k<=5;k++) {
    const el=document.getElementById(`p${k}`);
    if(el) { el.value=state[`p${k}`]; document.getElementById(`p${k}Val`).textContent=parseFloat(state[`p${k}`]).toFixed(2); }
    const lbl=document.getElementById(`p${k}Lbl`);
    if(lbl) lbl.textContent=MODE_PARAMS[state.mode][k-1];
  }
  const ss=document.getElementById('shapeScale'); if(ss){ss.value=state.shapeScale; document.getElementById('shapeScaleVal').textContent=state.shapeScale.toFixed(2);}
  const rr=document.getElementById('radialRays'); if(rr){rr.value=state.radialRays; document.getElementById('radialRaysVal').textContent=state.radialRays;}
  const rs=document.getElementById('radialSym'); if(rs) rs.checked=state.radialSym;
  const cm=document.getElementById('circleMask'); if(cm) cm.checked=state.circleMask;
  const ms=document.getElementById('mixShapes'); if(ms) ms.checked=state.mixShapes;
  const sp=document.getElementById('spacingToggle'); if(sp) sp.checked=state.spacing>0;
  const lm=document.getElementById('lightMixToggle'); if(lm) lm.checked=state.colorVar===3;
  document.querySelectorAll('.mode-btn').forEach((b,j)=>b.classList.toggle('active',j===state.mode));
  document.querySelectorAll('.shape-btn').forEach((b,j)=>b.classList.toggle('active',SHAPES[j]?.id===state.pixelShapeType));
  document.querySelectorAll('.color-swatch-wide').forEach(x=>x.classList.toggle('active',parseInt(x.dataset.schemeId)===state.colorScheme));
  if(typeof updateSizeBtns==='function') updateSizeBtns();
}

function applyUndo() {
  if (!undoStack.length) return;
  Object.assign(state, JSON.parse(undoStack.pop()));
  syncUI();
  const btn = document.getElementById('btnUndo');
  if (btn) btn.disabled = undoStack.length === 0;
}

// ================================================================
//  MATH HELPERS
// ================================================================
let _noiseSeed = 0;
function setNoiseSeed(s) { _noiseSeed = s; }
function _hash(x,y) {
  const n = Math.sin(x*127.1 + y*311.7 + _noiseSeed*74.3) * 43758.5453;
  return n - Math.floor(n);
}
function _fade(f) { return f*f*f*(f*(f*6-15)+10); }
function noise2(x,y) {
  const ix=Math.floor(x), iy=Math.floor(y);
  const fx=x-ix, fy=y-iy;
  const ux=_fade(fx), uy=_fade(fy);
  const a=_hash(ix,iy), b=_hash(ix+1,iy), c=_hash(ix,iy+1), d=_hash(ix+1,iy+1);
  return (a+(b-a)*ux) + ((c+(d-c)*ux)-(a+(b-a)*ux))*uy;
}

let _rng = 0;
function rngSeed(s) { _rng = s >>> 0; }
function rng() {
  _rng = (Math.imul(_rng, 1664525) + 1013904223) >>> 0;
  return _rng / 0x100000000;
}

// 4-octave Perlin noise
function noiseP(x, y) {
  let v = 0, amp = 1, freq = 1, max = 0;
  for (let o = 0; o < 4; o++) {
    v   += noise2(x * freq, y * freq) * amp;
    max += amp;
    amp  *= 0.5;
    freq *= 2.0;
  }
  return v / max;
}

// Weighted hex color picker (nv = 0..1)
// Smooth weighted color sample: nv=0..1 maps continuously across palette
function hexSample(colors, weights, nv) {
  const total = weights.reduce((a,b)=>a+b, 0);
  const stops = [];
  let acc = 0;
  for (let i = 0; i < colors.length; i++) {
    stops.push(acc / total);
    acc += weights[i];
  }
  stops.push(1.0);
  const t = Math.max(0, Math.min(0.9999, nv));
  for (let i = 0; i < colors.length - 1; i++) {
    if (t <= stops[i+1]) {
      const seg = (t - stops[i]) / (stops[i+1] - stops[i]);
      return hexLerp(colors[i], colors[i+1], seg);
    }
  }
  return colors[colors.length - 1];
}

// Linear interpolation between two hex colors (t = 0..1)
function hexLerp(hex1, hex2, t) {
  const parse = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  const [r1,g1,b1] = parse(hex1);
  const [r2,g2,b2] = parse(hex2);
  const r = Math.round(r1 + (r2-r1)*t);
  const g = Math.round(g1 + (g2-g1)*t);
  const b = Math.round(b1 + (b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

  document.getElementById('btnSeed').onclick   =()=>{ state.seed=Math.floor(Math.random()*999999); };
  document.getElementById('btnReset').onclick  =resetParams;
  document.getElementById('btnSave').onclick = () => {
    // Always export at 2x resolution
    const offscreen = document.createElement('canvas');
    offscreen.width  = CANVAS_SIZE * 2;
    offscreen.height = CANVAS_SIZE * 2;
    const octx = offscreen.getContext('2d');
    octx.imageSmoothingEnabled = false;
    // Draw current canvas (already DPR-scaled) scaled to 2x output
    octx.drawImage(canvas, 0, 0, CANVAS_SIZE * 2, CANVAS_SIZE * 2);
    const a = document.createElement('a');
    a.download = `pattern_${state.seed}@2x.png`;
    a.href = offscreen.toDataURL('image/png');
    a.click();
  };

  // SVG export: convert current canvas pixels to SVG rects
  document.getElementById('btnSaveSvg').onclick = () => {
    const ps   = state.pixelSize;
    const sp   = state.spacing;
    const cs   = COLOR_SCHEMES[state.colorScheme];
    let rects  = '';
    const zoom = state.shapeScale;
    const gridCX = cols * ps / 2;
    const gridCY = isDiamondMode() ? rows * ps / 2 - CANVAS_SIZE/4 : rows * ps / 2;
    const offX   = CANVAS_SIZE/2 - gridCX/zoom;
    const offY   = CANVAS_SIZE/2 - gridCY/zoom;
    const circR  = CANVAS_SIZE / 2;

    // Exact same inCircle logic as render (pre-zoom grid coords)
    function svgInCircle(gx, gy) {
      if (!state.radialSym || !state.circleMask) return true;
      const cx = gx * ps, cy = gy * ps;
      const dx = cx - gridCX, dy = cy - gridCY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > circR) return false;
      const fadeStart = circR * 0.65;
      if (dist > fadeStart) {
        const tt = (dist - fadeStart) / (circR - fadeStart);
        const keepProb = 1 - Math.pow(tt, 1.5);
        if (noise2(cx * 0.05 + state.seed * 0.001, cy * 0.05) > keepProb) return false;
      }
      return true;
    }

    for (let gy=0; gy<rows; gy++) {
      for (let gx=0; gx<cols; gx++) {
        if (!grid[gy*cols+gx]) continue;
        if (!svgInCircle(gx, gy)) continue;
        const sx = offX + gx * ps / zoom;
        const sy = offY + gy * ps / zoom;
        const sw = (ps - sp) / zoom;
        const color = getPixelColor(gx, gy, sx, sy);
        const shape = state.mixShapes
          ? SHAPES[Math.floor(noise2(gx*0.2+state.seed*0.0001, gy*0.2)*SHAPES.length)].id
          : state.pixelShapeType;
        if (shape === 1) {
          const hx = sw/2, hy = sw/2;
          rects += `<polygon points="${sx+hx},${sy} ${sx+sw},${sy+hy} ${sx+hx},${sy+sw} ${sx},${sy+hy}" fill="${color}"/>`;
        } else if (shape === 2) {
          rects += `<circle cx="${sx+sw/2}" cy="${sy+sw/2}" r="${sw/2}" fill="${color}"/>`;
        } else if (shape === 3) {
          const t3=sw/3;
          rects += `<rect x="${sx+t3}" y="${sy}" width="${t3}" height="${sw}" fill="${color}"/>`;
          rects += `<rect x="${sx}" y="${sy+t3}" width="${sw}" height="${t3}" fill="${color}"/>`;
        } else {
          rects += `<rect x="${sx}" y="${sy}" width="${sw}" height="${sw}" fill="${color}"/>`;
        }
      }
    }

    // Add SVG clipPath circle for clean edge
    const clipId = state.radialSym ? `<defs><clipPath id="circ"><circle cx="${CANVAS_SIZE/2}" cy="${CANVAS_SIZE/2}" r="${circR}"/></clipPath></defs>` : '';
    const clipAttr = state.radialSym ? ` clip-path="url(#circ)"` : '';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${CANVAS_SIZE}" height="${CANVAS_SIZE}">
${clipId}
<rect width="${CANVAS_SIZE}" height="${CANVAS_SIZE}" fill="${cs.bg}"/>
<g${clipAttr}>${rects}</g>
</svg>`;
    const a = document.createElement('a');
    a.download = `pattern_${state.seed}.svg`;
    a.href = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    a.click();
  };

  // MP4 export: record 5 seconds via MediaRecorder
  let mediaRec = null, recChunks = [];
  const btnMp4 = document.getElementById('btnRecMp4');
  btnMp4.onclick = () => {
    if (mediaRec && mediaRec.state === 'recording') {
      mediaRec.stop();
      return;
    }
    recChunks = [];
    const stream = canvas.captureStream(30);
    const mime   = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].find(m=>MediaRecorder.isTypeSupported(m)) || 'video/webm';
    mediaRec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 8_000_000 });
    mediaRec.ondataavailable = e => { if(e.data.size>0) recChunks.push(e.data); };
    mediaRec.onstop = () => {
      const blob = new Blob(recChunks, { type: mime });
      const a    = document.createElement('a');
      // Save as webm (widely supported; rename to .mp4 or convert if needed)
      a.download = `pattern_${state.seed}.webm`;
      a.href     = URL.createObjectURL(blob);
      a.click();
      btnMp4.textContent = '● MP4';
      btnMp4.style.background = '';
    };
    mediaRec.start();
    btnMp4.textContent = '■ Stop';
    btnMp4.style.background = '#c0392b';
    // Auto-stop after 10 seconds
    setTimeout(() => { if (mediaRec.state==='recording') mediaRec.stop(); }, 10000);
  };

  // ── PRESETS ──────────────────────────────────────────────────
  let presets = [];
  const presetGrid = document.getElementById('preset-grid');

  function captureThumb() {
    const thumb = document.createElement('canvas');
    thumb.width = thumb.height = 88;
    const tc = thumb.getContext('2d');
    tc.imageSmoothingEnabled = true;
    tc.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, 88, 88);
    return thumb.toDataURL();
  }

  function loadPreset(i) {
    Object.assign(state, JSON.parse(JSON.stringify(presets[i].state)));
    for (let k=1;k<=5;k++) {
      const el=document.getElementById(`p${k}`);
      if(el) { el.value=state[`p${k}`]; document.getElementById(`p${k}Val`).textContent=parseFloat(state[`p${k}`]).toFixed(2); }
    }
    document.getElementById('radialSym').checked = state.radialSym;
    document.getElementById('circleMask').checked = state.circleMask;
    document.getElementById('mixShapes').checked = state.mixShapes;
    document.getElementById('spacingToggle').checked = state.spacing > 0;
    document.getElementById('shapeScale').value = state.shapeScale;
    document.getElementById('shapeScaleVal').textContent = state.shapeScale.toFixed(2);
    document.getElementById('radialRays').value = state.radialRays;
    document.getElementById('radialRaysVal').textContent = state.radialRays;
    document.querySelectorAll('.mode-btn').forEach((b,j) => b.classList.toggle('active', j === state.mode));
    document.querySelectorAll('.shape-btn').forEach((b,j) => b.classList.toggle('active', SHAPES[j]?.id === state.pixelShapeType));
    document.querySelectorAll('.color-swatch-wide').forEach(x => x.classList.toggle('active', parseInt(x.dataset.schemeId) === state.colorScheme));
    if (typeof updateSizeBtns === 'function') updateSizeBtns();
    for(let k=1;k<=5;k++) { const el=document.getElementById(`p${k}Lbl`); if(el) el.textContent=MODE_PARAMS[state.mode][k-1]; }
  }

  function renderPresets() {
    presetGrid.innerHTML = '';
    presets.forEach((p, i) => {
      const slot = document.createElement('div');
      slot.className = 'preset-slot filled';
      const img = document.createElement('img');
      img.src = p.thumb;
      slot.appendChild(img);
      const del = document.createElement('span');
      del.className = 'preset-del'; del.textContent = '✕';
      del.onclick = e => { e.stopPropagation(); presets.splice(i, 1); renderPresets(); };
      slot.appendChild(del);
      slot.onclick = () => loadPreset(i);
      presetGrid.appendChild(slot);
    });
    // Add button at bottom
    const add = document.createElement('div');
    add.className = 'preset-slot';
    const plus = document.createElement('span');
    plus.className = 'plus'; plus.textContent = '+';
    add.appendChild(plus);
    add.onclick = () => {
      requestAnimationFrame(() => {
        presets.push({ state: JSON.parse(JSON.stringify(state)), thumb: captureThumb() });
        renderPresets();
      });
    };
    presetGrid.appendChild(add);
  }
  renderPresets();

  updateModeName();
}

function setMode(i) {
  state.mode=i;
  document.querySelectorAll('.mode-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  for(let k=1;k<=5;k++) {
    const el=document.getElementById(`p${k}Lbl`);
    if(el) el.textContent=MODE_PARAMS[i][k-1];
  }
  updateModeName();
}

function updateModeName() {}

function resetParams() {
  ['p1','p2','p3','p4','p5','spacing','shapeScale','speed','radialRays'].forEach(k=>{
    state[k]=DEFAULT_STATE[k];
    const el=document.getElementById(k);
    if(el) el.value=state[k];
    const vl=document.getElementById(k+'Val');
    if(vl) vl.textContent=Number(state[k]).toFixed(
      String(el?.step||'1').includes('.')?2:0);
  });
  state.pixelSize=DEFAULT_STATE.pixelSize;
  if(typeof updateSizeBtns==='function') updateSizeBtns();
  state.radialSym=DEFAULT_STATE.radialSym; document.getElementById('radialSym').checked=state.radialSym;
  state.circleMask=DEFAULT_STATE.circleMask; document.getElementById('circleMask').checked=state.circleMask;
  state.mixShapes=DEFAULT_STATE.mixShapes; document.getElementById('mixShapes').checked=state.mixShapes;
  state.animate  =DEFAULT_STATE.animate;
  const btnPlay2 = document.getElementById('btnPlayPause');
  if (btnPlay2) btnPlay2.textContent = state.animate ? '⏸' : '▶';
  state.speed = DEFAULT_STATE.speed;
  document.querySelectorAll('.speed-btn').forEach(b => {
    b.classList.toggle('active', parseFloat(b.dataset.speed) === state.speed);
  });
}

// ================================================================
//  GRID
// ================================================================
// diamondMode: when shape=diamond, we use a denser row grid (step=ps/2 vertically)
function isDiamondMode() {
  return !state.mixShapes && state.pixelShapeType === 1;
}

function updateGrid() {
  const ps = state.pixelSize;
  const scale = state.radialSym ? Math.max(1, state.shapeScale) : 1;
  cols = Math.max(1, Math.ceil(CANVAS_SIZE / ps * scale));
  rows = Math.max(1, Math.ceil(CANVAS_SIZE / ps * scale));
  grid    = new Uint8Array(cols * rows);   // 0/1 on-off
  gridRaw = new Float32Array(cols * rows); // 0..1 raw value for vivid coloring
}

function setCell(x, y, on, raw) {
  if (x>=0 && x<cols && y>=0 && y<rows) {
    grid[y*cols+x]    = on ? 1 : 0;
    gridRaw[y*cols+x] = raw !== undefined ? raw : (on ? 1 : 0);
  }
}

function isVivid() { return COLOR_SCHEMES[state.colorScheme].id >= 12; }

function applySymmetry(x, y, val, rawVal) {
  const raw = rawVal !== undefined ? rawVal : (val ? 1 : 0);
  if (state.radialSym) {
    const cx=cols/2, cy=rows/2;
    for (let i=0; i<state.radialRays; i++) {
      const a=(Math.PI*2/state.radialRays)*i;
      const c=Math.cos(a), s=Math.sin(a);
      const dx=x-cx, dy=y-cy;
      setCell(Math.round(cx+dx*c-dy*s), Math.round(cy+dx*s+dy*c), val, raw);
    }
  } else {
    setCell(x,        y,        val, raw);
    setCell(cols-1-x, y,        val, raw);
    setCell(x,        rows-1-y, val, raw);
    setCell(cols-1-x, rows-1-y, val, raw);
  }
}

// ================================================================
//  PATTERN GENERATORS — polar coordinates, symmetry via foldAng
// ================================================================

function polar(x, y) {
  const cx = cols/2, cy = rows/2;
  const dx = x - cx, dy = y - cy;
  const r   = Math.sqrt(dx*dx + dy*dy) / (Math.min(cols, rows) * 0.5);
  const ang = Math.atan2(dy, dx);
  return [r, ang];
}

// Fold angle into [0, PI/rays] for built-in rotational symmetry
function foldAng(ang, rays) {
  const step = Math.PI / rays;
  const a = ((ang % (step*2)) + step*2) % (step*2);
  return a < step ? a : step*2 - a;
}

function generateNoiseLines() {
  const scale  = 0.03 + state.p1*0.06;
  const thick  = 0.015 + state.p2*0.06;
  const layers = 1 + Math.floor(state.p3*3);
  const rays   = Math.max(1, state.radialRays);
  if (state.radialSym) {
    for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
      const [r, ang] = polar(x, y);
      const fa = foldAng(ang, rays);
      let on=0, raw=0;
      for (let l=0; l<layers; l++) {
        const n = noiseP(r*scale*(1+l*0.5)*60 + t*state.p5, fa*scale*(1+l*0.5)*60 + t*state.p4);
        const d = Math.abs(n - Math.floor(n*6.0)/6.0);
        if (d < thick) { on=1; raw=Math.max(raw, 1-d/thick); }
      }
      setCell(x, y, on, raw);
    }
  } else {
    for (let x=0; x<cols/2; x++) for (let y=0; y<rows/2; y++) {
      let on=0, raw=0;
      for (let l=0; l<layers; l++) {
        const n = noiseP(x*scale*(1+l*0.5)+t*state.p5, y*scale*(1+l*0.5)+t*state.p4);
        const d = Math.abs(n - Math.floor(n*6.0)/6.0);
        if (d < thick) { on=1; raw=Math.max(raw, 1-d/thick); }
      }
      applySymmetry(x, y, on, raw);
    }
  }
}

function generateCyberWaves() {
  const freq1   = 0.08 + 0.15*state.p1;
  const freq2   = 0.05 + 0.10*state.p2;
  const amp1    = 0.5  + 0.5 *state.p3;
  const amp2    = 0.3  + 0.7 *state.p4;
  const density = 0.3  + 0.2 *state.p5;
  const rays    = Math.max(2, state.radialRays);
  if (state.radialSym) {
    for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
      const [r, ang] = polar(x, y);
      const rr = r * cols * 0.5;
      const l1 = Math.sin(rr*freq1 + Math.cos(ang*rays)*amp1 + t*1.0);
      const l2 = Math.cos(rr*freq2 + Math.sin(ang*rays)*amp2 + t*0.75);
      const l3 = Math.sin(r*20 + t*0.5);
      const v  = (l1+l2+l3)/3;
      setCell(x, y, Math.abs(v) > density ? 1 : 0, Math.abs(v));
    }
  } else {
    const cx = cols/4, cy = rows/4;
    for (let x=0; x<cols/2; x++) for (let y=0; y<rows/2; y++) {
      const dx = x-cx, dy = y-cy;
      const rr = Math.sqrt(dx*dx+dy*dy);
      const ang = Math.atan2(dy, dx);
      const l1 = Math.sin(rr*freq1 + Math.cos(ang*rays)*amp1 + t*1.0);
      const l2 = Math.cos(rr*freq2 + Math.sin(ang*rays)*amp2 + t*0.75);
      const l3 = Math.sin(dx*dy*0.03 + t*0.5);
      const v  = (l1+l2+l3)/3;
      applySymmetry(x, y, Math.abs(v) > density ? 1 : 0, Math.abs(v));
    }
  }
}

function generateBiomorph() {
  const scale = 0.03 + 0.04*state.p1;
  const twist = state.p2 * Math.PI*2;
  const rays  = Math.max(1, state.radialRays);
  if (state.radialSym) {
    for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
      const [r, ang] = polar(x, y);
      const fa = foldAng(ang, rays);
      const n  = noiseP(r*60*scale + t*state.p3, fa*60*scale + t*state.p4);
      const n2 = noiseP(r*60*scale*2.0 + t*state.p2, fa*60*scale*2.0 + t*state.p5);
      const v  = Math.sin(n*Math.PI*4+twist) * Math.cos(n2*Math.PI*4);
      setCell(x, y, v>0.4?1:0, (v+1)/2);
    }
  } else {
    for (let x=0; x<cols/2; x++) for (let y=0; y<rows/2; y++) {
      const n  = noiseP(x*scale+t*state.p3, y*scale+t*state.p4);
      const n2 = noiseP(x*scale*2.0+t*state.p2, y*scale*2.0+t*state.p5);
      const v  = Math.sin(n*Math.PI*4+twist) * Math.cos(n2*Math.PI*4);
      applySymmetry(x, y, v>0.4?1:0, (v+1)/2);
    }
  }
}

function generateMandala() {
  const cx     = cols / 2, cy = rows / 2;
  const radial1 = 0.05 + state.p1 * (0.25 - 0.05);
  const radial2 = 0.03 + state.p2 * (0.15 - 0.03);
  const waves1  = 2    + state.p3 * (10 - 2);
  const waves2  = 1    + state.p4 * (6  - 1);
  const speed1  = 0.2  + state.p5 * (1.5 - 0.2);
  const rays    = state.radialRays;

  for (let x = 0; x < cols; x++) for (let y = 0; y < rows; y++) {
    const dx  = x - cx;
    const dy  = y - cy;
    const r   = Math.sqrt(dx*dx + dy*dy);
    const ang = Math.atan2(dy, dx);
    const v1  = Math.sin(r * radial1 * waves1 + t * speed1);
    const v2  = Math.cos(r * radial2 * waves2 - t * speed1 * 0.7);
    const v3  = Math.sin(ang * rays + t * 0.5);
    const val = v1 + v2 + v3;
    setCell(x, y, val > 1.0 ? 1 : 0, (val + 3) / 6);
  }
}

function generateCrystal() {
  const sc    = 0.06 + state.p1 * 0.10;
  const rays  = Math.max(1, state.radialRays);

  if (state.radialSym) {
    for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
      const [r, ang] = polar(x, y);
      const fa = foldAng(ang, rays);
      const px = r * 60 * sc, py = fa * 60 * sc;
      // Noise warps the coordinates for organic distortion
      const warp = noise2(px * 0.3 + state.seed * 0.001, py * 0.3 + state.seed * 0.002) * 1.8;
      const n1 = Math.sin((px + warp + t * state.p3) * Math.PI * 2);
      const n2 = Math.sin((py + warp * 0.7 + t * state.p4) * Math.PI * 2);
      const n3 = Math.sin((px + py) * 0.7 * Math.PI * 2 + warp * 0.5 + t * state.p5);
      const v  = (n1 + n2 + n3) / 3;
      setCell(x, y, v > (0.2 - state.p2 * 0.4) ? 1 : 0, (v + 1) / 2);
    }
  } else {
    for (let x=0; x<cols/2; x++) for (let y=0; y<rows/2; y++) {
      const nx = x * sc, ny = y * sc;
      const warp = noise2(nx * 0.4 + state.seed * 0.001, ny * 0.4 + state.seed * 0.002) * 1.6;
      const n1 = Math.sin((nx + warp + t * state.p4) * Math.PI * 2);
      const n2 = Math.sin((ny + warp * 0.7 + t * state.p3) * Math.PI * 2);
      const n3 = Math.sin((nx + ny) * 0.7 * Math.PI * 2 + warp * 0.5 + t * state.p5);
      const n4 = Math.sin((nx - ny) * 0.5 * Math.PI * 2 + warp * 0.3 + t * state.p5 * 0.7);
      const v  = (n1 + n2 + n3 + n4) / 4;
      applySymmetry(x, y, v > (0.2 - state.p2 * 0.4) ? 1 : 0, (v + 1) / 2);
    }
  }
}

function generatePlasma() {
  const f1      = 0.08 + state.p1*0.12;
  const f2      = 0.06 + state.p2*0.10;
  const f3      = 0.05 + state.p3*0.08;
  const density = 0.50 + state.p4*0.45;
  const bands   = 2    + state.p5*5;
  const rays    = Math.max(1, state.radialRays);
  if (state.radialSym) {
    for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
      const [r, ang] = polar(x, y);
      const fa = foldAng(ang, rays);
      const rr = r * cols * 0.5;
      // Sinusoidal interference
      const p  = (Math.sin(rr*f1 + t*0.3)
                + Math.sin(fa*40*f2 + t*0.2)
                + Math.sin((rr+fa*20)*f3 + t*0.15)
                + Math.sin(rr*0.07 - t*0.25)) / 4;
      const v  = Math.abs(Math.sin(p*Math.PI*bands));
      setCell(x, y, v>density?1:0, v);
    }
  } else {
    for (let x=0; x<cols/2; x++) for (let y=0; y<rows/2; y++) {
      const dx = x-cols/4, dy = y-rows/4;
      const rr = Math.sqrt(dx*dx+dy*dy);
      // Classic plasma: sinusoidal interference grid
      const p  = (Math.sin(x*f1 + t*0.3)
                + Math.sin(y*f2 + t*0.2)
                + Math.sin((x+y)*f3 + t*0.15)
                + Math.sin(rr*0.07 - t*0.25)) / 4;
      const v  = Math.abs(Math.sin(p*Math.PI*bands));
      applySymmetry(x, y, v>density?1:0, v);
    }
  }
}

const GENERATORS = {
  noiseLines:generateNoiseLines, cyberWaves:generateCyberWaves,
  biomorph:generateBiomorph,     mandala:generateMandala,
  crystal:generateCrystal,       plasma:generatePlasma,
};

// ================================================================
//  COLOR
// ================================================================
function getPixelColor(x, y, screenX, screenY) {
  const cs=COLOR_SCHEMES[state.colorScheme];
  const [bh,bs,bl]=cs.fgBase;
  const [rh,,rl]=cs.fgRange;

  // Vivid (raw-mapped) and Layers (hard bands) schemes
  if (cs.vivid || cs.layers) {
    const pal = cs.palette;
    const n = pal.length;
    let idx;
    if (cs.layers) {
      const d = layerDist ? layerDist[y*cols+x] : 0;
      const zoneSize = Math.max(2, Math.round(cols * 0.08));
      idx = Math.min(n-1, Math.floor(d / zoneSize));
    } else {
      const raw = gridRaw[y * cols + x];
      idx = Math.min(n-1, Math.floor(raw * n));
    }
    const [ph, ps2, pl] = pal[idx];
    return `hsl(${ph},${ps2}%,${pl}%)`;
  }

  // Dark hex palette schemes (id 6-11)
  if (cs.hexColors) {
    // noiseP (4 octaves) gives organic smooth gradients without hard edges
    // ns ~0.015 at cols=80 → broad flowing zones, no sharp boundaries
    const ns = 0.025 * (80 / cols);

    // Three independent noise fields at very different scales for organic distribution
    const nv1 = noiseP(x * ns + state.seed * 0.0001, y * ns + state.seed * 0.0002);
    const nv2 = noiseP(x * ns * 3.1 + state.seed * 0.0007 + 71.3, y * ns * 2.3 + state.seed * 0.0004 + 43.7);
    const nv3 = noiseP(x * ns * 0.4 + state.seed * 0.0003 + 19.1, y * ns * 0.5 + state.seed * 0.0006 + 83.2);
    const nv = (nv1 * 0.5 + nv2 * 0.3 + nv3 * 0.2);

    // Noise mode: smooth flowing gradient across palette
    if (state.colorVar === 1) {
      return hexSample(cs.hexColors, cs.hexWeights, nv);
    }

    // Radial mode: gradient from center outward, softened with noise
    if (state.colorVar === 5) {
      const dx = (x - cols/2) / (cols/2);
      const dy = (y - rows/2) / (rows/2);
      const dist = Math.min(1, Math.sqrt(dx*dx + dy*dy));
      const distNoisy = Math.max(0, Math.min(0.9999, dist * 0.75 + nv * 0.25));
      const colors = cs.hexColors;
      const ti = distNoisy * (colors.length - 1);
      const i0 = Math.floor(ti), i1 = Math.min(colors.length - 1, i0 + 1);
      return hexLerp(colors[i0], colors[i1], ti - i0);
    }

    // Mix mode (colorVar === 3): base noise gradient + random pixel pops from palette
    if (state.colorVar === 3) {
      const baseColor = hexSample(cs.hexColors, cs.hexWeights, nv);
      // High-freq noise for scattered pixel pops
      const popN = noise2(x * 1.3 + state.seed * 0.0011 + 53.1,
                          y * 1.3 + state.seed * 0.0019 + 37.4);
      if (popN > 0.82) {
        // Pick a random color from palette using a different noise field
        const pickN = noise2(x * 2.7 + state.seed * 0.0031 + 11.3,
                             y * 2.7 + state.seed * 0.0023 + 91.7);
        const pickIdx = Math.floor(pickN * cs.hexColors.length);
        const popColor = cs.hexColors[Math.min(cs.hexColors.length - 1, pickIdx)];
        return popColor;
      }
      return baseColor;
    }
  }

  // Noise mode: wide slow gradient that drifts gently with time
  if(state.colorVar===1 || rh===0) {
    if(rh===0) return `hsl(${bh},${bs}%,${bl}%)`;
    const nv  = noise2(x*0.03 + colorT, y*0.03 + colorT*0.7);
    const nv2 = noise2(x*0.025 + 5 + colorT*0.5, y*0.025 + colorT*0.3);
    const hOff = (nv -0.5)*2*rh;
    const lOff = (nv2-0.5)*2*rl;
    const h = ((bh+hOff)%360+360)%360;
    const lMin = rl > 25 ? 12 : 10;
    const l = Math.max(lMin, Math.min(95, bl+lOff));
    const sFactor = rl > 25 ? Math.max(0.1, (l - lMin) / 45) : 1;
    const s = Math.round(bs * Math.min(1, sFactor));
    return `hsl(${h|0},${s}%,${l|0}%)`;
  }

  // Radial mode: X-axis and Y-axis each carry a different hue,
  // they blend multiplicatively from center outward like Color Space painting
  if (state.colorVar === 5) {
    const dx = (x - cols/2) / (cols/2);
    const dy = (y - rows/2) / (rows/2);
    const dist  = Math.min(1, Math.sqrt(dx*dx + dy*dy));
    const dist2 = dist * dist;
    const isLight = COLOR_SCHEMES[state.colorScheme].bg.startsWith('#f') ||
                    COLOR_SCHEMES[state.colorScheme].bg.startsWith('#e');
    const h = ((bh - rh * dist * 1.4) % 360 + 360) % 360;
    let l, s;
    if (isLight) {
      // High contrast: deep center, near-white edges
      l = 28 + dist2 * 62;
      s = Math.min(100, bs + 40 - dist2 * 50);
    } else {
      // Dark theme: softer radial, stays in pastel range
      l = 55 + dist2 * 22;
      s = Math.min(100, bs + 15 - dist2 * 20);
    }
    return `hsl(${h|0},${s|0}%,${l|0}%)`;
  }


  const isLightMix = COLOR_SCHEMES[state.colorScheme].bg.startsWith('#f') ||
                     COLOR_SCHEMES[state.colorScheme].bg.startsWith('#e');
  if (isLightMix) {
    // Base: same as Radial mode
    const dx = (x - cols/2) / (cols/2);
    const dy = (y - rows/2) / (rows/2);
    const dist  = Math.min(1, Math.sqrt(dx*dx + dy*dy));
    const dist2 = dist * dist;
    const h = ((bh - rh * dist * 1.4) % 360 + 360) % 360;
    const l = 28 + dist2 * 62;
    const s = Math.min(100, bs + 40 - dist2 * 50);
    // ~10% pixels get a random contrasting hue pop
    const popN = noise2(x*1.3 + state.seed*0.0011 + 53.1, y*1.3 + state.seed*0.0019 + 37.4);
    if (popN > 0.90) {
      const pickN = noise2(x*2.7 + state.seed*0.0031 + 11.3, y*2.7 + state.seed*0.0023 + 91.7);
      const popH = ((h + 90 + pickN * 180) % 360 + 360) % 360;
      return `hsl(${popH|0},${Math.round(s*1.2)}%,${l|0}%)`;
    }
    return `hsl(${h|0},${s|0}%,${l|0}%)`;
  }

  // Dark Mix: broad noise + hue pops via noise
  const nv  = noise2(x*0.04 + colorT, y*0.04 + colorT*0.6);
  let hOff  = (nv-0.5)*2*rh;
  let lOff  = (noise2(x*0.03+5, y*0.03)-0.5)*2*rl;
  const popN2 = noise2(x*0.8 + state.seed*0.001, y*0.8 + state.seed*0.002);
  if (popN2 > 0.72) {
    const pd = noise2(x*0.5+300, y*0.5+300);
    hOff += (pd>0.5?1:-1)*rh*0.6;
    lOff  = (noise2(x*0.5+400, y*0.5+400)-0.5)*2*rl*1.4;
  }
  const h=((bh+hOff)%360+360)%360;
  const l=Math.max(10,Math.min(95,bl+lOff));
  return `hsl(${h|0},${bs}%,${l|0}%)`;
}

// ================================================================
//  DRAW PIXEL
// ================================================================
function drawPixel(px, py, pw, shape) {
  const x0 = Math.round(px), y0 = Math.round(py), s = Math.round(pw);
  switch(shape) {
    case 0: // Square
      ctx.fillRect(x0, y0, s, s);
      break;
    case 2: // Circle
      ctx.beginPath();
      ctx.arc(x0 + s/2, y0 + s/2, s/2, 0, Math.PI*2);
      ctx.fill();
      break;
    case 3: // Plus — arms extend to cell edge so crosses connect to neighbours
      ctx.fillRect(x0 + s*0.38, y0 - 1,     s*0.24, s + 2);
      ctx.fillRect(x0 - 1,      y0 + s*0.38, s + 2,  s*0.24);
      break;
  }
}

// ================================================================
//  LAYERS: compute distance from edge for each ON pixel
// ================================================================
function computeLayerDepth() {
  // BFS from all OFF cells to find distance of each ON cell from nearest edge
  const dist = new Int16Array(cols * rows).fill(-1);
  const queue = [];
  // seed: all ON cells adjacent to an OFF cell get dist=0
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (!grid[y*cols+x]) continue;
      let onEdge = false;
      for (const [dx,dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nx=x+dx, ny=y+dy;
        if (nx<0||nx>=cols||ny<0||ny>=rows||!grid[ny*cols+nx]) { onEdge=true; break; }
      }
      if (onEdge) { dist[y*cols+x]=0; queue.push(y*cols+x); }
    }
  }
  // BFS inward
  let head = 0;
  while (head < queue.length) {
    const idx = queue[head++];
    const x = idx % cols, y = (idx/cols)|0;
    for (const [dx,dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nx=x+dx, ny=y+dy;
      if (nx<0||nx>=cols||ny<0||ny>=rows) continue;
      const ni = ny*cols+nx;
      if (grid[ni] && dist[ni]===-1) {
        dist[ni] = dist[idx]+1;
        queue.push(ni);
      }
    }
  }
  return dist;
}


function render() {
  ctx.fillStyle = COLOR_SCHEMES[state.colorScheme].bg;
  ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

  const ps   = state.pixelSize;
  const sp   = state.spacing;
  const zoom = state.shapeScale;
  const circR = CANVAS_SIZE / 2;
  const gridCX = cols * ps / 2;
  const gridCY = isDiamondMode() ? rows * ps / 2 - CANVAS_SIZE/4 : rows * ps / 2;

  ctx.save();
  ctx.translate(CANVAS_SIZE / 2, CANVAS_SIZE / 2);
  ctx.scale(zoom, zoom);
  ctx.translate(-gridCX, -gridCY);

  // Circular fade check (in pre-zoom grid coords)
  function inCircle(cx, cy) {
    if (!state.radialSym || !state.circleMask) return true;
    const dx = cx - gridCX, dy = cy - gridCY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > circR) return false;
    const fadeStart = circR * 0.65;
    if (dist > fadeStart) {
      const tt = (dist - fadeStart) / (circR - fadeStart);
      const keepProb = 1 - Math.pow(tt, 1.5);
      // use cx/cy as stable noise coords
      if (noise2(cx * 0.05 + state.seed * 0.001, cy * 0.05) > keepProb) return false;
    }
    return true;
  }

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (!grid[y * cols + x]) continue;

      let cellShape;
      if (state.mixShapes) {
        const nv = noise2(x * 0.20 + state.seed * 0.0001, y * 0.20);
        cellShape = SHAPES[Math.floor(nv * SHAPES.length)].id;
      } else {
        cellShape = state.pixelShapeType;
      }

      if (cellShape === 1 && !state.mixShapes) {
        const rx = Math.max(1, ps/2 - sp/2);
        const ry = Math.max(1, ps   - sp/2);
        const cx = x * ps + (y % 2 === 1 ? ps/2 : 0) + ps/2;
        const cy = y * ps - CANVAS_SIZE/4;
        if (cy - ry > CANVAS_SIZE) continue;
        if (!inCircle(cx, cy)) continue;
        const sx = (cx - gridCX) * zoom + CANVAS_SIZE/2;
        const sy = (cy - gridCY) * zoom + CANVAS_SIZE/2;
        ctx.fillStyle = getPixelColor(x, y, sx, sy);
        ctx.beginPath();
        ctx.moveTo(cx,      cy - ry);
        ctx.lineTo(cx + rx, cy);
        ctx.lineTo(cx,      cy + ry);
        ctx.lineTo(cx - rx, cy);
        ctx.closePath();
        ctx.fill();

      } else if (cellShape === 1 && state.mixShapes) {
        const r  = Math.max(1, ps/2 - sp/2);
        const cx = x * ps + ps/2;
        const cy = y * ps + ps/2;
        if (!inCircle(cx, cy)) continue;
        const sx = (cx - gridCX) * zoom + CANVAS_SIZE/2;
        const sy = (cy - gridCY) * zoom + CANVAS_SIZE/2;
        ctx.fillStyle = getPixelColor(x, y, sx, sy);
        ctx.beginPath();
        ctx.moveTo(cx,     cy - r);
        ctx.lineTo(cx + r, cy);
        ctx.lineTo(cx,     cy + r);
        ctx.lineTo(cx - r, cy);
        ctx.closePath();
        ctx.fill();

      } else {
        const totalSp = sp;
        const pw = Math.max(1, ps - totalSp);
        const px = x * ps + totalSp * 0.5;
        const py = y * ps + totalSp * 0.5;
        const cx = px + pw/2, cy = py + pw/2;
        if (!inCircle(cx, cy)) continue;
        const sx = (cx - gridCX) * zoom + CANVAS_SIZE/2;
        const sy = (cy - gridCY) * zoom + CANVAS_SIZE/2;
        ctx.fillStyle = getPixelColor(x, y, sx, sy);
        drawPixel(px, py, pw, cellShape);
      }
    }
  }

  ctx.restore();
}

// ================================================================
//  LOOP
// ================================================================
function loop(now) {
  requestAnimationFrame(loop);
  const dt=now-lastTime; lastTime=now;
  // fps removed
  if(state.animate) t+=state.speed;
  colorT += 0.004; // always drifts, independent of animate
  updateGrid();
  setNoiseSeed(state.seed); rngSeed(state.seed);
  GENERATORS[MODES[state.mode].key]();
  if (COLOR_SCHEMES[state.colorScheme].layers) layerDist = computeLayerDepth();
  render();
}

buildUI();

// ================================================================
//  THREE.JS FLIP ENGINE
// ================================================================
const flipEngine = (() => {
  const canvas = document.getElementById('flipCanvas');
  const W = 640, H = 640;
  canvas.width = W; canvas.height = H;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
  renderer.setSize(W, H, false); // false = don't update CSS size
  renderer.setClearColor(0xffffff);

  // overlayCanvas must match exactly the WebGL canvas internal size
  const overlayCanvas = document.getElementById('overlayCanvas');
  overlayCanvas.width  = W;
  overlayCanvas.height = H;
  const octxOv = overlayCanvas.getContext('2d');

  const scene  = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(0, W, 0, H, -1000, 1000);
  camera.position.z = 500;

  let pixelSize  = 20;
  let waveType   = 1;
  let speed      = 0.04;
  let flip       = 0;
  let targetFlip = 0;
  let frameCount = 0;
  let tex1 = null, tex2 = null;
  let videoEl1 = null, videoEl2 = null;

  // Offscreen canvases for pixel sampling
  const oc1 = document.createElement('canvas');
  const oc2 = document.createElement('canvas');
  const octx1 = oc1.getContext('2d', { willReadFrequently: true });
  const octx2 = oc2.getContext('2d', { willReadFrequently: true });

  // Pool of meshes
  let meshes = [];
  let cols = 0, rows = 0;

  function rebuild() {
    meshes.forEach(m => scene.remove(m));
    meshes = [];
    cols = Math.ceil(W / pixelSize);
    rows = Math.ceil(H / pixelSize);
    const geo = new THREE.PlaneGeometry(pixelSize, pixelSize);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(c * pixelSize + pixelSize / 2, r * pixelSize + pixelSize / 2, 0);
        scene.add(mesh);
        meshes.push(mesh);
      }
    }
  }

  function sampleColor(octx, px, py, ps) {
    const sx = Math.min(Math.floor(px + ps / 2), octx.canvas.width - 1);
    const sy = Math.min(Math.floor(py + ps / 2), octx.canvas.height - 1);
    try {
      const d = octx.getImageData(sx, sy, 1, 1).data;
      return { r: d[0], g: d[1], b: d[2] };
    } catch(e) { return { r: 255, g: 255, b: 255 }; }
  }

  function updateTextures() {
    if (videoEl1 && !videoEl1.paused) octx1.drawImage(videoEl1, 0, 0, W, H);
    if (videoEl2 && !videoEl2.paused) octx2.drawImage(videoEl2, 0, 0, W, H);
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  function render() {
    requestAnimationFrame(render);
    const mw = document.getElementById('media-wrap');
    if (mw.style.display === 'none') return;

    frameCount++;
    updateTextures();

    flip = lerp(flip, targetFlip, speed);

    const cx = W / 2, cy = H / 2;
    let idx = 0;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const mesh = meshes[idx++];
        if (!mesh) continue;

        const px = c * pixelSize;
        const py = r * pixelSize;
        const d  = Math.sqrt((px - cx) ** 2 + (py - cy) ** 2);

        let localOffset = 0;
        switch (waveType) {
          case 1: localOffset = d * 0.003; break;
          case 2: localOffset = 0.5 + 0.2 * Math.sin(d * 0.2 + frameCount * 0.2); break;
          case 3: localOffset = 0.5 + 0.5 * Math.sin((px + py) * 0.03 + frameCount * 0.08); break;
          case 4: localOffset = ((px + py) / (W + H)) * 1.2; break;
          case 5: {
            const ang = Math.atan2(py - cy, px - cx);
            const rad = Math.sqrt((px - cx) ** 2 + (py - cy) ** 2);
            localOffset = 0.5 + 0.5 * Math.sin(5 * ang + rad * 0.05 + frameCount * 0.1);
            break;
          }
          case 6: localOffset = 0.5 + 0.5 * Math.sin(d * 0.05 + frameCount * 0.05); break;
        }

        let localFlip = flip - localOffset;
        localFlip = Math.max(0, Math.min(Math.PI, localFlip));

        const c1 = tex1 ? sampleColor(octx1, px, py, pixelSize) : { r: 200, g: 200, b: 200 };
        const c2 = tex2 ? sampleColor(octx2, px, py, pixelSize) : { r: 80,  g: 80,  b: 80  };

        const isWhite1 = c1.r > 240 && c1.g > 240 && c1.b > 240;
        const isWhite2 = c2.r > 240 && c2.g > 240 && c2.b > 240;

        if (isWhite1 && isWhite2) {
          mesh.material.color.setRGB(1, 1, 1);
          mesh.rotation.y = 0;
          mesh.scale.x = 1;
        } else {
          // Y-axis rotation: scaleX simulates perspective foreshortening
          const scaleX = Math.abs(Math.cos(localFlip));
          const useImg2 = localFlip >= Math.PI / 2;
          const col = useImg2 ? c2 : c1;
          mesh.material.color.setRGB(col.r / 255, col.g / 255, col.b / 255);
          mesh.scale.x = Math.max(0.001, scaleX);
          // True 3D Y rotation
          mesh.rotation.y = localFlip;
        }
      }
    }

    renderer.render(scene, camera);

    // Draw overlay grid on top every frame - each pixel has its own gradient
    octxOv.clearRect(0, 0, W, H);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = c * pixelSize;
        const y = r * pixelSize;
        const grd = octxOv.createLinearGradient(x, y, x + pixelSize, y);
        grd.addColorStop(0, 'rgba(255,255,255,0.26)');
        grd.addColorStop(1, 'rgba(255,255,255,0.10)');
        octxOv.fillStyle = grd;
        octxOv.fillRect(x, y, pixelSize, pixelSize);
      }
    }
  }

  function setImage(slot, img) {
    document.getElementById('media-placeholder').style.display = 'none';
    const oc = slot === 1 ? oc1 : oc2;
    const octx = slot === 1 ? octx1 : octx2;
    oc.width = W; oc.height = H;
    octx.drawImage(img, 0, 0, W, H);
    if (slot === 1) { tex1 = true; videoEl1 = null; }
    else tex2 = true;
    if (meshes.length === 0) rebuild();
  }

  function setVideo(vid, slot = 1) {
    document.getElementById('media-placeholder').style.display = 'none';
    const oc = slot === 1 ? oc1 : oc2;
    const octx = slot === 1 ? octx1 : octx2;
    oc.width = W; oc.height = H;
    if (slot === 1) { videoEl1 = vid; tex1 = true; }
    else            { videoEl2 = vid; tex2 = true; }
    if (meshes.length === 0) rebuild();
  }

  rebuild();
  render();

  return {
    get pixelSize() { return pixelSize; },
    set pixelSize(v) { pixelSize = v; },
    get waveType() { return waveType; },
    set waveType(v) { waveType = v; },
    get speed() { return speed; },
    set speed(v) { speed = v; },
    get targetFlip() { return targetFlip; },
    set targetFlip(v) { targetFlip = v; },
    rebuild, setImage, setVideo
  };
})();
</script>
</body>
