<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL PATTERN GEN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap');

  :root {
    --bg: #111111;
    --panel: #161616;
    --border: #2a2a2a;
    --accent: #ffffff;
    --accent2: #aaaaaa;
    --accent3: #cccccc;
    --text: #dddddd;
    --dim: #555555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 290px; min-width: 290px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; overflow-x: hidden;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-track { background: var(--panel); }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .logo {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 4px; font-size: 11px;
    color: var(--accent); text-transform: uppercase;
  }
  .logo span { color: var(--dim); }

  .section { padding: 11px 16px; border-bottom: 1px solid var(--border); }
  .section-label {
    font-size: 9px; letter-spacing: 3px;
    color: var(--dim); text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Mode buttons */
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .mode-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; padding: 6px 3px;
    cursor: pointer; letter-spacing: 0.5px;
    text-transform: uppercase; transition: all 0.15s;
    text-align: center;
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mode-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Sliders */
  .param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .param-label {
    font-size: 9px; color: var(--dim);
    width: 74px; flex-shrink: 0;
    text-transform: uppercase; line-height: 1.2;
  }
  .param-value {
    font-size: 9px; color: var(--accent);
    width: 28px; text-align: right; flex-shrink: 0;
  }
  input[type=range] {
    flex: 1; -webkit-appearance: none;
    height: 2px; background: var(--border);
    outline: none; border-radius: 1px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px; height: 11px;
    background: var(--accent); border-radius: 50%;
    cursor: pointer; transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.4); }

  /* Shape picker */
  .shape-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; margin-bottom: 8px; }
  .shape-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); font-size: 16px; padding: 6px 0;
    cursor: pointer; text-align: center;
    transition: all 0.15s; border-radius: 2px;
  }
  .shape-btn:hover { border-color: var(--accent); }
  .shape-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Color scheme swatches */
  .color-scheme-grid { display:flex; flex-direction:row; gap:8px; margin-bottom:10px; }
  .color-swatch {
    height: 36px; border-radius: 3px; cursor: pointer;
    border: 2px solid transparent;
    position: relative; overflow: hidden;
    transition: border-color 0.15s, transform 0.1s;
    display: flex; align-items: flex-end; padding: 3px 5px;
  }
  .color-swatch:hover { transform: scale(1.04); }
  .color-swatch.active { border-color: var(--accent) !important; }
  .color-swatch span {
    font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    pointer-events: none; line-height: 1;
  }
  .color-swatch.dark-text span { color: rgba(0,0,0,0.7); text-shadow: none; }

  /* Color variation */
  .color-var-row { display: flex; gap: 5px; }
  .cvar-btn {
    flex: 1; background: transparent;
    border: 1px solid var(--border); color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; padding: 5px 2px;
    cursor: pointer; text-align: center;
    letter-spacing: 0.5px; text-transform: uppercase;
    transition: all 0.15s;
  }
  .cvar-btn:hover { border-color: var(--text); color: var(--text); }
  .cvar-btn.active { border-color: var(--accent); color: var(--accent); }

  /* Toggles */
  .toggle-row {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 7px;
  }
  .toggle-label { font-size: 9px; letter-spacing: 1px; color: var(--text); text-transform: uppercase; }
  .toggle { position: relative; width: 36px; height: 18px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border); border-radius: 9px;
    cursor: pointer; transition: background 0.2s;
  }
  .toggle-track::after {
    content: ''; position: absolute;
    left: 3px; top: 3px;
    width: 12px; height: 12px;
    background: var(--dim); border-radius: 50%;
    transition: all 0.2s;
  }
  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle input:checked + .toggle-track::after { left: 21px; background: #000; }

  /* Buttons */
  .btn-row { display: flex; gap: 5px; margin-top: 4px; }
  .btn {
    flex: 1; background: transparent;
    border: 1px solid var(--border); color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; padding: 7px 2px;
    cursor: pointer; letter-spacing: 1px;
    text-transform: uppercase; transition: all 0.15s; text-align: center;
  }
  .btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn.primary { border-color: var(--accent3); color: var(--accent3); }
  .btn.primary:hover { background: var(--accent3); color: #fff; }
  .btn.reset:hover { border-color: #ffcc00; color: #ffcc00; }

  /* Canvas area */
  #main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    background: var(--bg);
    padding: 24px;
  }
  #canvas-wrap {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    height: calc(100vh - 80px);
    aspect-ratio: 1;
    flex-shrink: 0;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  #export-row {
    display: flex; gap: 8px; flex-shrink: 0;
  }
  .export-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; padding: 6px 16px;
    cursor: pointer; letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .export-btn:hover { border-color: var(--text); color: var(--text); }
  #fps {
    position: absolute; bottom: 12px; right: 16px;
    font-size: 9px; color: var(--dim); letter-spacing: 2px;
    pointer-events: none;
  }
  #mode-name {
    position: absolute; top: 16px; left: 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px; font-weight: 700; letter-spacing: 4px;
    color: rgba(255,255,255,0.08); text-transform: uppercase;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">quip gen <span>// v3</span></div>

  <div class="section">
    <div class="section-label">Pattern Mode</div>
    <div class="mode-grid" id="modeGrid"></div>

  </div>

  <div class="section">
    <div class="section-label">Parameters</div>
    <div id="params"></div>
  </div>

  <div class="section">
    <div class="section-label">Pixel Style</div>
    <div class="shape-grid" id="shapeGrid"></div>
    <div class="toggle-row">
      <span class="toggle-label">Mix Shapes</span>
      <label class="toggle"><input type="checkbox" id="mixShapes"><span class="toggle-track"></span></label>
    </div>
    <div class="param-row">
      <span class="param-label">Size</span>
      <input type="range" id="pixelSize" min="2" max="20" value="6">
      <span class="param-value" id="pixelSizeVal">6</span>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Spacing</span>
      <label class="toggle"><input type="checkbox" id="spacingToggle"><span class="toggle-track"></span></label>
    </div>
    <div class="param-row">
      <span class="param-label">Zoom</span>
      <input type="range" id="shapeScale" min="0.3" max="2.0" step="0.05" value="1.0">
      <span class="param-value" id="shapeScaleVal">1.0</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Color Scheme</div>
    <div class="color-scheme-grid" id="colorGrid"></div>
    <div class="section-label" style="margin-top:2px;margin-bottom:6px">Color Variation</div>
    <div class="color-var-row" id="colorVarRow"></div>
  </div>

  <div class="section">
    <div class="section-label">Animation</div>
    <div class="toggle-row">
      <span class="toggle-label">Animate</span>
      <label class="toggle"><input type="checkbox" id="animate" checked><span class="toggle-track"></span></label>
    </div>
    <div class="param-row">
      <span class="param-label">Speed</span>
      <input type="range" id="speed" min="0.002" max="0.08" step="0.002" value="0.02">
      <span class="param-value" id="speedVal">0.02</span>
    </div>
    <div class="btn-row">
      <button class="btn" id="btnSeed">New Seed</button>
      <button class="btn reset" id="btnReset">Reset</button>
    </div>
  </div>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>
  <div id="export-row">
    <button class="export-btn" id="btnSave">PNG</button>
    <button class="export-btn" id="btnSaveSvg">SVG</button>
    <button class="export-btn" id="btnRecMp4">● MP4</button>
  </div>
</div>

<script>
// ================================================================
//  CONSTANTS
// ================================================================
const CANVAS_SIZE = 640;

const MODES = [
  { name: "Noise Lines", key: "noiseLines" },
  { name: "Cyber Waves", key: "cyberWaves" },
  { name: "Biomorph",    key: "biomorph"   },
  { name: "Mandala",     key: "mandala"    },
  { name: "Wave Graph",  key: "waveGraph"  },
  { name: "Crystal",     key: "crystal"    },
  { name: "Circuit",     key: "circuit"    },
  { name: "Plasma",      key: "plasma"     },
];

// Semantic param names per mode
const MODE_PARAMS = [
  ["Scale",    "Thickness", "Layers",  "Time Y",  "Time X" ],  // Noise Lines
  ["Freq 1",   "Freq 2",    "Amp 1",   "Amp 2",   "Thresh" ],  // Cyber Waves
  ["Scale",    "Twist",     "Time X",  "Time Y",  "Detail" ],  // Biomorph
  ["Ring Freq","Twist",     "Rings",   "Density", "—"      ],  // Mandala
  ["Freq X",   "Freq Y",    "Diag",    "Cross",   "—"      ],  // Wave Graph
  ["Scale",    "Sharpness", "Time Y",  "Time X",  "Depth"  ],  // Crystal
  ["Noise",    "Thresh",    "Grid",    "—",       "—"      ],  // Circuit
  ["Freq 1",   "Freq 2",    "Freq 3",  "Density", "Bands"  ],  // Plasma

// Shapes: square, diamond, circle, plus
const SHAPES = [

  { sym: "◆", id: 1, tip: "Diamond" },
  { sym: "●", id: 2, tip: "Circle"  },

// Color schemes — bg + HSL base + range for variation
// fgBase = [h,s,l], fgRange = [hRange, sRange, lRange]
// Groups: light (0-5), dark pastel (6-11), vivid tartan (12-17)

    grad:"linear-gradient(135deg,hsl(240,32%,22%),hsl(240,38%,65%),hsl(0,0%,93%))",

    grad:"linear-gradient(135deg,hsl(0,0%,18%),hsl(210,22%,52%),hsl(0,0%,90%))",

    grad:"linear-gradient(135deg,hsl(5,48%,24%),hsl(15,52%,54%),hsl(0,0%,90%))",

    grad:"linear-gradient(135deg,hsl(160,30%,20%),hsl(170,36%,55%),hsl(0,0%,90%))",

  // ── Vivid tartan (dark bg, 3-color palette) ──────────────────
  { id:12, name:"Jan",    bg:"#000000",
    grad:"linear-gradient(135deg,hsl(210,70%,72%),hsl(180,60%,78%),hsl(220,65%,68%))",

    grad:"linear-gradient(135deg,hsl(142,40%,44%),hsl(158,38%,50%))",

    grad:"linear-gradient(135deg,hsl(24,55%,58%),hsl(52,55%,62%))",
    fgBase:[24,55,54],  fgRange:[28,0,10],
    palette:[[24,95,28],[14,92,32],[4,83,44],[355,67,63],[345,45,90]], vivid:true },
];

const COLOR_VAR_MODES = [
  { id:1, label:"Noise"  },
  { id:3, label:"Mix"    },
  { id:5, label:"Radial" },
];

const DEFAULT_STATE = {
  mode:0, p1:0.5, p2:0.5, p3:0.5, p4:0.5, p5:0.5,
  pixelSize:6, spacing:0, shapeScale:1.0, pixelShapeType:0,
  mixShapes:false, colorScheme:0, colorVar:1,
  radialSym:false, radialRays:6, animate:true, speed:0.02,
};

let state = { ...DEFAULT_STATE, seed: Math.floor(Math.random()*999999) };
let t = 0, colorT = 0, grid, gridRaw, layerDist, cols = 0, rows = 0, lastTime = 0;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
canvas.width = canvas.height = CANVAS_SIZE;

// ================================================================
//  MATH HELPERS
// ================================================================
let _noiseSeed = 0;
function setNoiseSeed(s) { _noiseSeed = s; }
function _hash(x,y) {
  const n = Math.sin(x*127.1 + y*311.7 + _noiseSeed*74.3) * 43758.5453;
  return n - Math.floor(n);
}
function _fade(f) { return f*f*f*(f*(f*6-15)+10); }
function noise2(x,y) {
  const ix=Math.floor(x), iy=Math.floor(y);
  const fx=x-ix, fy=y-iy;
  const ux=_fade(fx), uy=_fade(fy);
  const a=_hash(ix,iy), b=_hash(ix+1,iy), c=_hash(ix,iy+1), d=_hash(ix+1,iy+1);
  return (a+(b-a)*ux) + ((c+(d-c)*ux)-(a+(b-a)*ux))*uy;
}

let _rng = 0;
function rngSeed(s) { _rng = s >>> 0; }
function rng() {
  _rng = (Math.imul(_rng, 1664525) + 1013904223) >>> 0;
  return _rng / 0x100000000;
}

// ================================================================
//  UI BUILD
// ================================================================
function buildUI() {
  // Mode buttons
  const mg = document.getElementById('modeGrid');
  MODES.forEach((m,i) => {
    const b = document.createElement('button');
    b.className = 'mode-btn' + (i===state.mode?' active':'');
    b.textContent = m.name;
    b.onclick = () => setMode(i);
    mg.appendChild(b);
  });

  // Param sliders
  const pc = document.getElementById('params');
  for (let i=1;i<=5;i++) {
    const row = document.createElement('div'); row.className='param-row';
    const lbl = document.createElement('span'); lbl.className='param-label';
    lbl.id=`p${i}Lbl`; lbl.textContent=MODE_PARAMS[state.mode][i-1];
    const sl  = document.createElement('input'); sl.type='range';
    sl.min=0; sl.max=1; sl.step=0.01; sl.value=state[`p${i}`]; sl.id=`p${i}`;
    const vl  = document.createElement('span'); vl.className='param-value';
    vl.id=`p${i}Val`; vl.textContent=Number(state[`p${i}`]).toFixed(2);
    sl.oninput = () => {
      state[`p${i}`]=parseFloat(sl.value);
      vl.textContent=parseFloat(sl.value).toFixed(2);
    };
    row.appendChild(lbl); row.appendChild(sl); row.appendChild(vl);
    pc.appendChild(row);
  }

  // Shape picker
  const sg = document.getElementById('shapeGrid');
  SHAPES.forEach((s,i) => {
    const b=document.createElement('button');
    b.className='shape-btn'+(s.id===state.pixelShapeType?' active':'');
    b.textContent=s.sym; b.title=s.tip;
    b.onclick = () => {
      state.pixelShapeType=s.id;
      document.querySelectorAll('.shape-btn').forEach((x,j)=>x.classList.toggle('active',j===i));
    };
    sg.appendChild(b);
  });

  // Color swatches — 3 columns: light (0-5), dark (6-11), vivid (12-17)
  const cg = document.getElementById('colorGrid');
  cg.innerHTML = '';
  const groups = [
    { label:'Light',  ids: [0,1,2,3,4,5] },
    { label:'Dark',   ids: [6,7,8,9,10,11] },
    { label:'Vivid',  ids: [12,13,14,15,16,17] },
    { label:'Pantone', ids: [18,19,20,21,22,23] },
  ];
  groups.forEach(group => {
    const col = document.createElement('div');
    col.style.cssText = 'display:flex;flex-direction:column;gap:5px;flex:1;';
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:8px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:2px;';
    lbl.textContent = group.label;
    col.appendChild(lbl);
    group.ids.forEach(id => {
      const cs = COLOR_SCHEMES[id];
      const sw = document.createElement('div');
      const isLightBg = cs.bg.startsWith('#f') || cs.bg.startsWith('#e');
      sw.className = 'color-swatch' + (isLightBg?' dark-text':'') + (id===state.colorScheme?' active':'');
      sw.style.background = cs.grad;
      const sp = document.createElement('span'); sp.textContent = cs.name;
      sw.appendChild(sp);
      sw.onclick = () => {
        state.colorScheme = cs.id;
        const light = cs.bg.startsWith('#f') || cs.bg.startsWith('#e');
        if (light && cs.id !== 0 && state.colorVar === 1) state.colorVar = 5;
        if (!light && state.colorVar === 5) state.colorVar = 1;
        document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
        sw.classList.add('active');
        updateColorVarButtons();
      };
      col.appendChild(sw);
    });
    cg.appendChild(col);
  });

  // Color variation
  const cv=document.getElementById('colorVarRow');
  function isLightScheme() {
    const bg = COLOR_SCHEMES[state.colorScheme].bg;
    return bg.startsWith('#f') || bg.startsWith('#e');
  }
  function updateColorVarButtons() {
    cv.innerHTML = '';
    const light = isLightScheme();
    const isChalk = COLOR_SCHEMES[state.colorScheme].id === 0;
    COLOR_VAR_MODES.forEach((c,i) => {
      if (isChalk && c.id !== 1) return;         // Chalk: Noise only
      if (!isChalk && light && c.id === 1) return;  // light: hide Noise
      if (!light && c.id === 5) return;             // dark: hide Radial
      const b=document.createElement('button');
      b.className='cvar-btn'+(c.id===state.colorVar?' active':'');
      b.textContent=c.label;
      b.onclick = () => {
        state.colorVar=c.id;
        updateColorVarButtons();
      };
      cv.appendChild(b);
    });
  }
  updateColorVarButtons();

  // Wired sliders
  function wire(id,key,parse,vid) {
    const el=document.getElementById(id); if(!el) return;
    el.oninput = () => {
      state[key]=parse(el.value);
      if(vid) document.getElementById(vid).textContent=
        parseFloat(el.value).toFixed(String(el.step||'1').includes('.')?2:0);
    };
  }
  wire('pixelSize', 'pixelSize',  v=>Math.max(2,Math.min(20,parseInt(v))), 'pixelSizeVal');
  wire('shapeScale','shapeScale', v=>parseFloat(v),            'shapeScaleVal');
  wire('radialRays','radialRays', v=>parseInt(v),              'radialRaysVal');
  wire('speed',     'speed',      v=>parseFloat(v),            'speedVal');

  document.getElementById('spacingToggle').onchange = e => { state.spacing = e.target.checked ? 2 : 0; };
  document.getElementById('mixShapes').onchange=e=>state.mixShapes=e.target.checked;
  document.getElementById('radialSym').onchange=e=>state.radialSym=e.target.checked;
  document.getElementById('animate').onchange  =e=>state.animate  =e.target.checked;
  document.getElementById('btnSeed').onclick   =()=>{ state.seed=Math.floor(Math.random()*999999); };
  document.getElementById('btnReset').onclick  =resetParams;
  document.getElementById('btnSave').onclick = () => {
    const a = document.createElement('a');
    a.download = `pattern_${state.seed}.png`;
    a.href = canvas.toDataURL();
    a.click();
  };

  // SVG export: convert current canvas pixels to SVG rects
  document.getElementById('btnSaveSvg').onclick = () => {
    const ps   = state.pixelSize;
    const sp   = state.spacing;
    const cs   = COLOR_SCHEMES[state.colorScheme];
    let rects  = '';
    const zoom = state.shapeScale;
    const gridCX = cols * ps / 2;
    const gridCY = isDiamondMode() ? rows * ps / 2 - CANVAS_SIZE/4 : rows * ps / 2;
    const offX   = CANVAS_SIZE/2 - gridCX/zoom;
    const offY   = CANVAS_SIZE/2 - gridCY/zoom;
    const circR  = CANVAS_SIZE / 2;

    // Exact same inCircle logic as render (pre-zoom grid coords)
    function svgInCircle(gx, gy) {
      if (!state.radialSym) return true;
      const cx = gx * ps, cy = gy * ps;
      const dx = cx - gridCX, dy = cy - gridCY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > circR) return false;
      const fadeStart = circR * 0.65;
      if (dist > fadeStart) {
        const tt = (dist - fadeStart) / (circR - fadeStart);
        const keepProb = 1 - Math.pow(tt, 1.5);
        if (noise2(cx * 0.05 + state.seed * 0.001, cy * 0.05) > keepProb) return false;
      }
      return true;
    }

    for (let gy=0; gy<rows; gy++) {
      for (let gx=0; gx<cols; gx++) {
        if (!grid[gy*cols+gx]) continue;
        if (!svgInCircle(gx, gy)) continue;
        const sx = offX + gx * ps / zoom;
        const sy = offY + gy * ps / zoom;
        const sw = (ps - sp) / zoom;
        const color = getPixelColor(gx, gy, sx, sy);
        const shape = state.mixShapes
          ? SHAPES[Math.floor(noise2(gx*0.2+state.seed*0.0001, gy*0.2)*SHAPES.length)].id
          : state.pixelShapeType;
        if (shape === 1) {
          const hx = sw/2, hy = sw/2;
          rects += `<polygon points="${sx+hx},${sy} ${sx+sw},${sy+hy} ${sx+hx},${sy+sw} ${sx},${sy+hy}" fill="${color}"/>`;
        } else if (shape === 2) {
          rects += `<circle cx="${sx+sw/2}" cy="${sy+sw/2}" r="${sw/2}" fill="${color}"/>`;
        } else if (shape === 3) {
          const t3=sw/3;
          rects += `<rect x="${sx+t3}" y="${sy}" width="${t3}" height="${sw}" fill="${color}"/>`;
          rects += `<rect x="${sx}" y="${sy+t3}" width="${sw}" height="${t3}" fill="${color}"/>`;
        } else {
          rects += `<rect x="${sx}" y="${sy}" width="${sw}" height="${sw}" fill="${color}"/>`;
        }
      }
    }

    // Add SVG clipPath circle for clean edge
    const clipId = state.radialSym ? `<defs><clipPath id="circ"><circle cx="${CANVAS_SIZE/2}" cy="${CANVAS_SIZE/2}" r="${circR}"/></clipPath></defs>` : '';
    const clipAttr = state.radialSym ? ` clip-path="url(#circ)"` : '';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${CANVAS_SIZE}" height="${CANVAS_SIZE}">
${clipId}
<rect width="${CANVAS_SIZE}" height="${CANVAS_SIZE}" fill="${cs.bg}"/>
<g${clipAttr}>${rects}</g>
</svg>`;
    const a = document.createElement('a');
    a.download = `pattern_${state.seed}.svg`;
    a.href = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    a.click();
  };

  // MP4 export: record 5 seconds via MediaRecorder
  let mediaRec = null, recChunks = [];
  const btnMp4 = document.getElementById('btnRecMp4');
  btnMp4.onclick = () => {
    if (mediaRec && mediaRec.state === 'recording') {
      mediaRec.stop();
      return;
    }
    recChunks = [];
    const stream = canvas.captureStream(30);
    const mime   = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].find(m=>MediaRecorder.isTypeSupported(m)) || 'video/webm';
    mediaRec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 8_000_000 });
    mediaRec.ondataavailable = e => { if(e.data.size>0) recChunks.push(e.data); };
    mediaRec.onstop = () => {
      const blob = new Blob(recChunks, { type: mime });
      const a    = document.createElement('a');
      // Save as webm (widely supported; rename to .mp4 or convert if needed)
      a.download = `pattern_${state.seed}.webm`;
      a.href     = URL.createObjectURL(blob);
      a.click();
      btnMp4.textContent = '● MP4';
      btnMp4.style.background = '';
    };
    mediaRec.start();
    btnMp4.textContent = '■ Stop';
    btnMp4.style.background = '#c0392b';
    // Auto-stop after 10 seconds
    setTimeout(() => { if (mediaRec.state==='recording') mediaRec.stop(); }, 10000);
  };

  updateModeName();
}

function setMode(i) {
  state.mode=i;
  document.querySelectorAll('.mode-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  for(let k=1;k<=5;k++) {
    const el=document.getElementById(`p${k}Lbl`);
    if(el) el.textContent=MODE_PARAMS[i][k-1];
  }
  updateModeName();
}

function updateModeName() {}

function resetParams() {
  ['p1','p2','p3','p4','p5','pixelSize','spacing','shapeScale','speed','radialRays'].forEach(k=>{
    state[k]=DEFAULT_STATE[k];
    const el=document.getElementById(k);
    if(el) el.value=state[k];
    const vl=document.getElementById(k+'Val');
    if(vl) vl.textContent=Number(state[k]).toFixed(
      String(el?.step||'1').includes('.')?2:0);
  });
  state.radialSym=DEFAULT_STATE.radialSym; document.getElementById('radialSym').checked=state.radialSym;
  state.mixShapes=DEFAULT_STATE.mixShapes; document.getElementById('mixShapes').checked=state.mixShapes;
  state.animate  =DEFAULT_STATE.animate;   document.getElementById('animate').checked  =state.animate;
}

// ================================================================
//  GRID
// ================================================================
// diamondMode: when shape=diamond, we use a denser row grid (step=ps/2 vertically)
function isDiamondMode() {
  return !state.mixShapes && state.pixelShapeType === 1;
}

function updateGrid() {
  const ps = state.pixelSize;
  const scale = state.radialSym ? Math.max(1, state.shapeScale) : 1;
  cols = Math.max(1, Math.ceil(CANVAS_SIZE / ps * scale));
  rows = Math.max(1, Math.ceil(CANVAS_SIZE / ps * scale));
  grid    = new Uint8Array(cols * rows);   // 0/1 on-off
  gridRaw = new Float32Array(cols * rows); // 0..1 raw value for vivid coloring
}

function setCell(x, y, on, raw) {
  if (x>=0 && x<cols && y>=0 && y<rows) {
    grid[y*cols+x]    = on ? 1 : 0;
    gridRaw[y*cols+x] = raw !== undefined ? raw : (on ? 1 : 0);
  }
}

function isVivid() { return COLOR_SCHEMES[state.colorScheme].id >= 12; }

function applySymmetry(x, y, val, rawVal) {
  const raw = rawVal !== undefined ? rawVal : (val ? 1 : 0);
  if (state.radialSym) {
    const cx=cols/2, cy=rows/2;
    for (let i=0; i<state.radialRays; i++) {
      const a=(Math.PI*2/state.radialRays)*i;
      const c=Math.cos(a), s=Math.sin(a);
      const dx=x-cx, dy=y-cy;
      setCell(Math.round(cx+dx*c-dy*s), Math.round(cy+dx*s+dy*c), val, raw);
    }
  } else {
    setCell(x,        y,        val, raw);
    setCell(cols-1-x, y,        val, raw);
    setCell(x,        rows-1-y, val, raw);
    setCell(cols-1-x, rows-1-y, val, raw);
  }
}

// ================================================================
//  PATTERN GENERATORS — polar coordinates, symmetry via foldAng
// ================================================================

function polar(x, y) {
  const cx = cols/2, cy = rows/2;
  const dx = x - cx, dy = y - cy;
  const r   = Math.sqrt(dx*dx + dy*dy) / (Math.min(cols, rows) * 0.5);
  const ang = Math.atan2(dy, dx);
  return [r, ang];
}

// Fold angle into [0, PI/rays] for built-in rotational symmetry
function foldAng(ang, rays) {
  const step = Math.PI / rays;
  const a = ((ang % (step*2)) + step*2) % (step*2);
  return a < step ? a : step*2 - a;
}

function generateNoiseLines() {
  const scale  = 0.03 + state.p1*0.06;
  const thick  = 0.015 + state.p2*0.06;
  const layers = 1 + Math.floor(state.p3*3);
  const rays   = Math.max(1, state.radialRays);
  if (state.radialSym) {
    for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
      const [r, ang] = polar(x, y);
      const fa = foldAng(ang, rays);
      let on=0, raw=0;
      for (let l=0; l<layers; l++) {
        const n = noise2(r*scale*(1+l*0.5)*60 + t*state.p5, fa*scale*(1+l*0.5)*60 + t*state.p4);
        const d = Math.abs(n - Math.floor(n*8)/8);
        if (d < thick) { on=1; raw=Math.max(raw, 1-d/thick); }
      }
      setCell(x, y, on, raw);
    }
  } else {
    for (let x=0; x<cols/2; x++) for (let y=0; y<rows/2; y++) {
      let on=0, raw=0;
      for (let l=0; l<layers; l++) {
        const n = noise2(x*scale*(1+l*0.5)+t*state.p5, y*scale*(1+l*0.5)+t*state.p4);
        const d = Math.abs(n - Math.floor(n*8)/8);
        if (d < thick) { on=1; raw=Math.max(raw, 1-d/thick); }
      }
      applySymmetry(x, y, on, raw);
    }
  }
}

function generateCyberWaves() {
  const freq1   = 0.08 + 0.15*state.p1;
  const freq2   = 0.05 + 0.10*state.p2;
  const amp1    = 0.5  + 0.5 *state.p3;
  const amp2    = 0.3  + 0.7 *state.p4;
  const density = 0.25 + 0.5 *state.p5;
  const rays    = Math.max(2, state.radialRays);
  if (state.radialSym) {
    for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
      const [r, ang] = polar(x, y);
      const rr = r * cols * 0.5;
      const l1 = Math.sin(rr*freq1 + Math.cos(ang*rays)*amp1 + t);
      const l2 = Math.cos(rr*freq2 + Math.sin(ang*rays)*amp2 + t*0.75);
      const l3 = Math.sin(r*20 + t*0.5);
      const v  = (l1+l2+l3)/3;
      setCell(x, y, Math.abs(v) > density ? 1 : 0, Math.abs(v));
    }
  } else {
    const cx = cols/4, cy = rows/4;
    for (let x=0; x<cols/2; x++) for (let y=0; y<rows/2; y++) {
      const dx = x-cx, dy = y-cy;
      const rr = Math.sqrt(dx*dx+dy*dy);
      const ang = Math.atan2(dy, dx);
      const l1 = Math.sin(rr*freq1 + Math.cos(ang*rays)*amp1 + t);
      const l2 = Math.cos(rr*freq2 + Math.sin(ang*rays)*amp2 + t*0.75);
      const l3 = Math.sin(dx*dy*0.03 + t*0.5);
      const v  = (l1+l2+l3)/3;
      applySymmetry(x, y, Math.abs(v) > density ? 1 : 0, Math.abs(v));
    }
  }
}

function generateBiomorph() {
  const scale = 0.025 + 0.05*state.p1;
  const twist = state.p2 * Math.PI*2;
  const rays  = Math.max(1, state.radialRays);
  if (state.radialSym) {
    for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
      const [r, ang] = polar(x, y);
      const fa = foldAng(ang, rays);
      const n  = noise2(r*60*scale + t*state.p3, fa*60*scale + t*state.p4);
      const n2 = noise2(r*60*scale*1.7 + t*state.p2, fa*60*scale*1.7 + t*state.p5);
      const v  = Math.sin(n*Math.PI*4+twist) * Math.cos(n2*Math.PI*4);
      setCell(x, y, v>0.4?1:0, (v+1)/2);
    }
  } else {
    for (let x=0; x<cols/2; x++) for (let y=0; y<rows/2; y++) {
      const n  = noise2(x*scale+t*state.p3, y*scale+t*state.p4);
      const n2 = noise2(x*scale*1.7+t*state.p2, y*scale*1.7+t*state.p5);
      const v  = Math.sin(n*Math.PI*4+twist) * Math.cos(n2*Math.PI*4);
      applySymmetry(x, y, v>0.4?1:0, (v+1)/2);
    }
  }
}

function generateMandala() {
  const rFreq   = 0.05 + state.p3*0.15;
  const twist   = state.p2*2;
  const density = 2 - state.p4*1.8;
  const rays    = Math.max(1, state.radialRays);
  // Mandala always uses polar — it only makes sense radially
  for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
    const [r, ang] = polar(x, y);
    const rr = r * cols * 0.5;
    const v  = Math.sin(rr*rFreq + t) + Math.cos(ang*rays + rr*twist*0.05);
    if (v > density) setCell(x, y, 1, (v-density)/2);
  }
}

function generateWaveGraph() {
  const rays = Math.max(1, state.radialRays);
  if (state.radialSym) {
    for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
      const [r, ang] = polar(x, y);
      const fa = foldAng(ang, rays);
      const rr = r * cols * 0.5;
      const v  = Math.sin(rr*0.12*state.p1 + t)
               + Math.cos(fa*40*state.p2 + t*0.8)
               + Math.sin((rr+fa*20)*0.07*state.p3 + t*0.6)
               + Math.cos((rr-fa*20)*0.05*state.p4  + t*0.4);
      setCell(x, y, Math.abs(v)%1>0.5?1:0, Math.abs(v)%1);
    }
  } else {
    for (let x=0; x<cols/2; x++) for (let y=0; y<rows/2; y++) {
      const v = Math.sin(x*0.12*state.p1+t)
              + Math.cos(y*0.09*state.p2+t*0.8)
              + Math.sin((x+y)*0.07*state.p3+t*0.6)
              + Math.cos((x-y)*0.05*state.p4+t*0.4);
      applySymmetry(x, y, Math.abs(v)%1>0.5?1:0, Math.abs(v)%1);
    }
  }
}

function generateCrystal() {
  const sc   = 0.04 + state.p1*0.08;
  const rays = Math.max(1, state.radialRays);
  if (state.radialSym) {
    for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
      const [r, ang] = polar(x, y);
      const fa = foldAng(ang, rays);
      const px = r*60*sc, py = fa*60*sc;
      const n  = noise2(px, py + t*state.p3);
      const n2 = noise2(py+0.5, px*0.5 + t*state.p4*0.5);
      const n3 = noise2((px+py)*0.6+0.3, (px-py)*0.4 + t*state.p5*0.3);
      const v  = Math.abs(Math.sin((n+n2+n3)/3 * Math.PI * (4+state.p2*6)));
      setCell(x, y, v>0.7?1:0, v);
    }
  } else {
    for (let x=0; x<cols/2; x++) for (let y=0; y<rows/2; y++) {
      const n  = noise2(x*sc, y*sc + t*state.p3);
      const n2 = noise2(y*sc+0.5, x*sc*0.5 + t*state.p4*0.5);
      const n3 = noise2((x+y)*sc*0.6+0.3, (x-y)*sc*0.4 + t*state.p5*0.3);
      const v  = Math.abs(Math.sin((n+n2+n3)/3*Math.PI*(4+state.p2*6)));
      applySymmetry(x, y, v>0.7?1:0, v);
    }
  }
}

function generateCircuit() {
  const sc     = 0.2  + state.p1*0.4;
  const thresh = 0.35 + state.p2*0.3;
  const gs     = Math.max(1, Math.round(4+state.p3*8));
  const rays   = Math.max(1, state.radialRays);
  if (state.radialSym) {
    for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
      const [r, ang] = polar(x, y);
      const fa = foldAng(ang, rays);
      const ri = Math.round(r * cols * 0.5);
      const ai = Math.round(fa * rays * 20);
      const onLine = (ri % gs) < 1.5 || (ai % gs) < 1.5;
      const nv = noise2(r*sc*40 + t*0.05, fa*sc*40);
      setCell(x, y, (onLine && nv>thresh)?1:0, onLine ? nv : 0);
    }
  } else {
    for (let x=0; x<cols/2; x++) for (let y=0; y<rows/2; y++) {
      const onLine = (x%gs)<1.5 || (y%gs)<1.5;
      const nv = noise2(x*sc+t*0.05, y*sc);
      applySymmetry(x, y, (onLine&&nv>thresh)?1:0, onLine ? nv : 0);
    }
  }
}

function generatePlasma() {
  const f1      = 0.08 + state.p1*0.12;
  const f2      = 0.06 + state.p2*0.10;
  const f3      = 0.05 + state.p3*0.08;
  const density = 0.50 + state.p4*0.45;
  const bands   = 2    + state.p5*5;
  const rays    = Math.max(1, state.radialRays);
  if (state.radialSym) {
    for (let x=0; x<cols; x++) for (let y=0; y<rows; y++) {
      const [r, ang] = polar(x, y);
      const fa = foldAng(ang, rays);
      const rr = r * cols * 0.5;
      const p  = (Math.sin(rr*f1+t*0.3) + Math.sin(fa*40*f2+t*0.2)
                + Math.sin((rr+fa*20)*f3+t*0.15) + Math.sin(rr*0.07-t*0.25)) / 4;
      const v  = Math.abs(Math.sin(p*Math.PI*bands));
      setCell(x, y, v>density?1:0, v);
    }
  } else {
    for (let x=0; x<cols/2; x++) for (let y=0; y<rows/2; y++) {
      const dx = x-cols/4, dy = y-rows/4;
      const rr = Math.sqrt(dx*dx+dy*dy);
      const p  = (Math.sin(x*f1+t*0.3)+Math.sin(y*f2+t*0.2)
                +Math.sin((x+y)*f3+t*0.15)+Math.sin(rr*0.07-t*0.25)) / 4;
      const v  = Math.abs(Math.sin(p*Math.PI*bands));
      applySymmetry(x, y, v>density?1:0, v);
    }
  }
}

const GENERATORS = {
  noiseLines:generateNoiseLines, cyberWaves:generateCyberWaves,
  biomorph:generateBiomorph,     mandala:generateMandala,
  waveGraph:generateWaveGraph,   crystal:generateCrystal,
  circuit:generateCircuit,       plasma:generatePlasma,
};

// ================================================================
//  COLOR
// ================================================================
function getPixelColor(x, y, screenX, screenY) {
  const cs=COLOR_SCHEMES[state.colorScheme];
  const [bh,bs,bl]=cs.fgBase;
  const [rh,,rl]=cs.fgRange;

  // Vivid (raw-mapped) and Layers (hard bands) schemes
  if (cs.vivid || cs.layers) {
    const pal = cs.palette;
    const n = pal.length;
    let idx;
    if (cs.layers) {
      const d = layerDist ? layerDist[y*cols+x] : 0;
      const zoneSize = Math.max(2, Math.round(cols * 0.08));
      idx = Math.min(n-1, Math.floor(d / zoneSize));
    } else {
      const raw = gridRaw[y * cols + x];
      idx = Math.min(n-1, Math.floor(raw * n));
    }
    const [ph, ps2, pl] = pal[idx];
    return `hsl(${ph},${ps2}%,${pl}%)`;
  }

  // Noise mode: wide slow gradient that drifts gently with time
  if(state.colorVar===1 || rh===0) {
    if(rh===0) return `hsl(${bh},${bs}%,${bl}%)`;
    const nv  = noise2(x*0.03 + colorT, y*0.03 + colorT*0.7);
    const nv2 = noise2(x*0.025 + 5 + colorT*0.5, y*0.025 + colorT*0.3);
    const hOff = (nv -0.5)*2*rh;
    const lOff = (nv2-0.5)*2*rl;
    const h = ((bh+hOff)%360+360)%360;
    const lMin = rl > 25 ? 12 : 10; // glitch schemes: no pure black
    const l = Math.max(lMin, Math.min(95, bl+lOff));
    // Saturation fades near dark end for natural desaturation
    const sFactor = rl > 25 ? Math.max(0.1, (l - lMin) / 45) : 1;
    const s = Math.round(bs * Math.min(1, sFactor));
    return `hsl(${h|0},${s}%,${l|0}%)`;
  }

  // Radial mode: X-axis and Y-axis each carry a different hue,
  // they blend multiplicatively from center outward like Color Space painting
  if (state.colorVar === 5) {
    const dx = (x - cols/2) / (cols/2);
    const dy = (y - rows/2) / (rows/2);
    const dist  = Math.min(1, Math.sqrt(dx*dx + dy*dy));
    const dist2 = dist * dist;
    const isLight = COLOR_SCHEMES[state.colorScheme].bg.startsWith('#f') ||
                    COLOR_SCHEMES[state.colorScheme].bg.startsWith('#e');
    const h = ((bh - rh * dist * 1.4) % 360 + 360) % 360;
    let l, s;
    if (isLight) {
      // High contrast: deep center, near-white edges
      l = 28 + dist2 * 62;
      s = Math.min(100, bs + 40 - dist2 * 50);
    } else {
      // Dark theme: softer radial, stays in pastel range
      l = 55 + dist2 * 22;
      s = Math.min(100, bs + 15 - dist2 * 20);
    }
    return `hsl(${h|0},${s|0}%,${l|0}%)`;
  }


  const isLightMix = COLOR_SCHEMES[state.colorScheme].bg.startsWith('#f') ||
                     COLOR_SCHEMES[state.colorScheme].bg.startsWith('#e');
  if (isLightMix) {
    const dx = (x - cols/2) / (cols/2);
    const dy = (y - rows/2) / (rows/2);
    const dist  = Math.min(1, Math.sqrt(dx*dx + dy*dy));
    const dist2 = dist * dist;
    let h = ((bh - rh * dist * 1.4) % 360 + 360) % 360;
    let l = 28 + dist2 * 62;
    let s = Math.min(100, bs + 40 - dist2 * 50);
    // Use noise for pop decision - stable, organic, not grid-aligned
    const popN = noise2(x*0.8 + state.seed*0.001, y*0.8 + state.seed*0.002);
    if (popN > 0.75) {
      const popH = noise2(x*0.5 + 100, y*0.5 + 100);
      h = ((h + (popH-0.5)*rh) % 360 + 360) % 360;
      const popL = noise2(x*0.5 + 200, y*0.5 + 200);
      l = Math.max(20, Math.min(95, l + (popL-0.5)*18));
    }
    return `hsl(${h|0},${s|0}%,${l|0}%)`;
  }

  // Dark Mix: broad noise + hue pops via noise
  const nv  = noise2(x*0.04 + colorT, y*0.04 + colorT*0.6);
  let hOff  = (nv-0.5)*2*rh;
  let lOff  = (noise2(x*0.03+5, y*0.03)-0.5)*2*rl;
  const popN2 = noise2(x*0.8 + state.seed*0.001, y*0.8 + state.seed*0.002);
  if (popN2 > 0.72) {
    const pd = noise2(x*0.5+300, y*0.5+300);
    hOff += (pd>0.5?1:-1)*rh*0.6;
    lOff  = (noise2(x*0.5+400, y*0.5+400)-0.5)*2*rl*1.4;
  }
  const h=((bh+hOff)%360+360)%360;
  const l=Math.max(10,Math.min(95,bl+lOff));
  return `hsl(${h|0},${bs}%,${l|0}%)`;
}

// ================================================================
//  DRAW PIXEL
// ================================================================
function drawPixel(px, py, pw, shape) {
  const x0 = Math.round(px), y0 = Math.round(py), s = Math.round(pw);
  switch(shape) {
    case 0: // Square
      ctx.fillRect(x0, y0, s, s);
      break;
    case 2: // Circle
      ctx.beginPath();
      ctx.arc(x0 + s/2, y0 + s/2, s/2, 0, Math.PI*2);
      ctx.fill();
      break;
    case 3: // Plus — arms extend to cell edge so crosses connect to neighbours
      ctx.fillRect(x0 + s*0.38, y0 - 1,     s*0.24, s + 2);
      ctx.fillRect(x0 - 1,      y0 + s*0.38, s + 2,  s*0.24);
      break;
  }
}

// ================================================================
//  LAYERS: compute distance from edge for each ON pixel
// ================================================================
function computeLayerDepth() {
  // BFS from all OFF cells to find distance of each ON cell from nearest edge
  const dist = new Int16Array(cols * rows).fill(-1);
  const queue = [];
  // seed: all ON cells adjacent to an OFF cell get dist=0
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (!grid[y*cols+x]) continue;
      let onEdge = false;
      for (const [dx,dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nx=x+dx, ny=y+dy;
        if (nx<0||nx>=cols||ny<0||ny>=rows||!grid[ny*cols+nx]) { onEdge=true; break; }
      }
      if (onEdge) { dist[y*cols+x]=0; queue.push(y*cols+x); }
    }
  }
  // BFS inward
  let head = 0;
  while (head < queue.length) {
    const idx = queue[head++];
    const x = idx % cols, y = (idx/cols)|0;
    for (const [dx,dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nx=x+dx, ny=y+dy;
      if (nx<0||nx>=cols||ny<0||ny>=rows) continue;
      const ni = ny*cols+nx;
      if (grid[ni] && dist[ni]===-1) {
        dist[ni] = dist[idx]+1;
        queue.push(ni);
      }
    }
  }
  return dist;
}


function render() {
  ctx.fillStyle = COLOR_SCHEMES[state.colorScheme].bg;
  ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

  const ps   = state.pixelSize;
  const sp   = state.spacing;
  const zoom = state.shapeScale;
  const circR = CANVAS_SIZE / 2;
  const gridCX = cols * ps / 2;
  const gridCY = isDiamondMode() ? rows * ps / 2 - CANVAS_SIZE/4 : rows * ps / 2;

  ctx.save();
  ctx.translate(CANVAS_SIZE / 2, CANVAS_SIZE / 2);
  ctx.scale(zoom, zoom);
  ctx.translate(-gridCX, -gridCY);

  // Circular fade check (in pre-zoom grid coords)
  function inCircle(cx, cy) {
    if (!state.radialSym) return true;
    const dx = cx - gridCX, dy = cy - gridCY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > circR) return false;
    const fadeStart = circR * 0.65;
    if (dist > fadeStart) {
      const tt = (dist - fadeStart) / (circR - fadeStart);
      const keepProb = 1 - Math.pow(tt, 1.5);
      // use cx/cy as stable noise coords
      if (noise2(cx * 0.05 + state.seed * 0.001, cy * 0.05) > keepProb) return false;
    }
    return true;
  }

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (!grid[y * cols + x]) continue;

      let cellShape;
      if (state.mixShapes) {
        const nv = noise2(x * 0.20 + state.seed * 0.0001, y * 0.20);
        cellShape = SHAPES[Math.floor(nv * SHAPES.length)].id;
      } else {
        cellShape = state.pixelShapeType;
      }

      if (cellShape === 1 && !state.mixShapes) {
        const rx = Math.max(1, ps/2 - sp/2);
        const ry = Math.max(1, ps   - sp/2);
        const cx = x * ps + (y % 2 === 1 ? ps/2 : 0) + ps/2;
        const cy = y * ps - CANVAS_SIZE/4;
        if (cy - ry > CANVAS_SIZE) continue;
        if (!inCircle(cx, cy)) continue;
        const sx = (cx - gridCX) * zoom + CANVAS_SIZE/2;
        const sy = (cy - gridCY) * zoom + CANVAS_SIZE/2;
        ctx.fillStyle = getPixelColor(x, y, sx, sy);
        ctx.beginPath();
        ctx.moveTo(cx,      cy - ry);
        ctx.lineTo(cx + rx, cy);
        ctx.lineTo(cx,      cy + ry);
        ctx.lineTo(cx - rx, cy);
        ctx.closePath();
        ctx.fill();

      } else if (cellShape === 1 && state.mixShapes) {
        const r  = Math.max(1, ps/2 - sp/2);
        const cx = x * ps + ps/2;
        const cy = y * ps + ps/2;
        if (!inCircle(cx, cy)) continue;
        const sx = (cx - gridCX) * zoom + CANVAS_SIZE/2;
        const sy = (cy - gridCY) * zoom + CANVAS_SIZE/2;
        ctx.fillStyle = getPixelColor(x, y, sx, sy);
        ctx.beginPath();
        ctx.moveTo(cx,     cy - r);
        ctx.lineTo(cx + r, cy);
        ctx.lineTo(cx,     cy + r);
        ctx.lineTo(cx - r, cy);
        ctx.closePath();
        ctx.fill();

      } else {
        const totalSp = sp;
        const pw = Math.max(1, ps - totalSp);
        const px = x * ps + totalSp * 0.5;
        const py = y * ps + totalSp * 0.5;
        const cx = px + pw/2, cy = py + pw/2;
        if (!inCircle(cx, cy)) continue;
        const sx = (cx - gridCX) * zoom + CANVAS_SIZE/2;
        const sy = (cy - gridCY) * zoom + CANVAS_SIZE/2;
        ctx.fillStyle = getPixelColor(x, y, sx, sy);
        drawPixel(px, py, pw, cellShape);
      }
    }
  }

  ctx.restore();
}

// ================================================================
//  LOOP
// ================================================================
function loop(now) {
  requestAnimationFrame(loop);
  const dt=now-lastTime; lastTime=now;
  // fps removed
  if(state.animate) t+=state.speed;
  colorT += 0.004; // always drifts, independent of animate
  updateGrid();
  setNoiseSeed(state.seed); rngSeed(state.seed);
  GENERATORS[MODES[state.mode].key]();
  if (COLOR_SCHEMES[state.colorScheme].layers) layerDist = computeLayerDepth();
  render();
}

buildUI();
requestAnimationFrame(loop);
</script>
</body>
